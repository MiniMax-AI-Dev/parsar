# Build the parsar-server image in CI and push releases to GHCR.
#
# This is the Phase 1 deliverable's "one command" enabler: docker-compose.yml
# (and the Phase 2 self-host compose) pull ghcr.io/<owner>/parsar-server by
# default. Same image, two compose profiles — profile not fork.
#
# Triggers:
#   - Pull request touching server/web/build inputs -> build only, no push
#   - Push to main touching server/web/build inputs -> :latest + :<sha>
#   - Tag push matching `parsar-server-v*`          -> :<release-tag>
#   - Manual workflow_dispatch                     -> build + push
#
# Output: ghcr.io/<owner-lowercase>/parsar-server:<tag>
#   - latest        on default-branch pushes
#   - <short-sha>   on every build
#   - <release-tag> on tag pushes (e.g. parsar-server-v0.1.0)
#
# Operators using their own registry: copy this into a fork and swap the
# `images:` field, or just override PARSAR_SERVER_IMAGE in the compose .env
# and never run this workflow.

name: parsar-server image

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "internal/**"
      - "apps/web/**"
      - "packages/tsconfig/**"
      # The image bakes cross-compiled parsar-daemon binaries (served at
      # /api/v1/parsar-daemon/download), so a daemon-only change must also
      # rebuild + republish the server image — else the served binary goes
      # stale against source.
      - "apps/parsar-daemon/**"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "docs/openapi/openapi.yaml"
      - ".dockerignore"
      - "Dockerfile"
      - ".github/workflows/parsar-server-release.yml"
      # Test-only edits must not rebuild + republish the multi-arch image.
      # `make check-go` already runs the Go test suite and enforces sqlc
      # drift, so a push that changes only *_test.go files still has its
      # signal covered by `check`. GitHub forbids mixing `paths` with
      # `paths-ignore`, so we negate these patterns inline.
      - "!server/**/*_test.go"
      - "!internal/**/*_test.go"
      - "!apps/**/*_test.go"
      - "!packages/**/*_test.go"
      - "!**/testdata/**"
    tags:
      - "parsar-server-v*"
  pull_request:
    paths:
      - "server/**"
      - "internal/**"
      - "apps/web/**"
      - "packages/tsconfig/**"
      - "apps/parsar-daemon/**"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "docs/openapi/openapi.yaml"
      - ".dockerignore"
      - "Dockerfile"
      - ".github/workflows/parsar-server-release.yml"
      # See push trigger above for why these are negated rather than
      # split into a separate paths-ignore block.
      - "!server/**/*_test.go"
      - "!internal/**/*_test.go"
      - "!apps/**/*_test.go"
      - "!packages/**/*_test.go"
      - "!**/testdata/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: parsar-server-image-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Choose build platforms
        id: platforms
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            echo "value=linux/amd64" >> "$GITHUB_OUTPUT"
          else
            echo "value=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute lowercase GHCR image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/parsar-server" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ steps.platforms.outputs.value }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
