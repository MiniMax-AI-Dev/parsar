# Build the parsar-server image in CI and push releases to GHCR.
#
# This is the Phase 1 deliverable's "one command" enabler: docker-compose.yml
# (and the Phase 2 self-host compose) pull ghcr.io/<owner>/parsar-server by
# default. Same image, two compose profiles — profile not fork.
#
# Triggers:
#   - Pull request touching server/web/build inputs -> build only, no push
#   - Push to main touching server/web/build inputs -> :latest + :<sha>
#   - Tag push matching `parsar-server-v*`          -> :<release-tag>
#   - Manual workflow_dispatch                     -> build + push
#
# Output: ghcr.io/<owner-lowercase>/parsar-server:<tag>
#   - latest        on default-branch pushes
#   - <short-sha>   on every build
#   - <release-tag> on tag pushes (e.g. parsar-server-v0.1.0)
#
# Operators using their own registry: copy this into a fork and swap the
# `images:` field, or just override PARSAR_SERVER_IMAGE in the compose .env
# and never run this workflow.

name: parsar-server image

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "internal/**"
      - "apps/web/**"
      - "packages/tsconfig/**"
      # The image bakes cross-compiled parsar-daemon binaries (served at
      # /api/v1/parsar-daemon/download), so a daemon-only change must also
      # rebuild + republish the server image — else the served binary goes
      # stale against source.
      - "apps/parsar-daemon/**"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "docs/openapi/openapi.yaml"
      - ".dockerignore"
      - "Dockerfile"
      - ".github/workflows/parsar-server-release.yml"
      # Test-only edits must not rebuild + republish the multi-arch image.
      # `make check-go` already runs the Go test suite and enforces sqlc
      # drift, so a push that changes only *_test.go files still has its
      # signal covered by `check`. GitHub forbids mixing `paths` with
      # `paths-ignore`, so we negate these patterns inline.
      - "!server/**/*_test.go"
      - "!internal/**/*_test.go"
      - "!apps/**/*_test.go"
      - "!packages/**/*_test.go"
      - "!**/testdata/**"
    tags:
      - "parsar-server-v*"
  pull_request:
    paths:
      - "server/**"
      - "internal/**"
      - "apps/web/**"
      - "packages/tsconfig/**"
      - "apps/parsar-daemon/**"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "docs/openapi/openapi.yaml"
      - ".dockerignore"
      - "Dockerfile"
      - ".github/workflows/parsar-server-release.yml"
      # See push trigger above for why these are negated rather than
      # split into a separate paths-ignore block.
      - "!server/**/*_test.go"
      - "!internal/**/*_test.go"
      - "!apps/**/*_test.go"
      - "!packages/**/*_test.go"
      - "!**/testdata/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: parsar-server-image-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute lowercase GHCR image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/parsar-server" >> "$GITHUB_OUTPUT"

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=parsar-server-linux-amd64

  build-publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare platform metadata
        id: platform
        shell: bash
        run: |
          platform="${{ matrix.platform }}"
          echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute lowercase GHCR image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/parsar-server" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.image.outputs.name }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=parsar-server-${{ steps.platform.outputs.pair }}
          cache-to: type=gha,mode=max,scope=parsar-server-${{ steps.platform.outputs.pair }}

      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ steps.platform.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build-publish
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute lowercase GHCR image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/parsar-server" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Create multi-platform image manifest
        env:
          DOCKER_METADATA_OUTPUT_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        shell: bash
        run: |
          cd /tmp/digests
          tags=()
          while IFS= read -r tag; do
            tags+=("-t" "$tag")
          done <<< "$DOCKER_METADATA_OUTPUT_TAGS"

          digests=()
          for digest in *; do
            digests+=("${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create "${tags[@]}" "${digests[@]}"
