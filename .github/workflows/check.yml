# The single source of truth for "what does CI run" lives in the Makefile
# (`make check`). That target chains sqlc generate, go test, the migration
# drift check (which spins up postgres via docker compose), and the pnpm
# typecheck. Re-expressing those steps in YAML would inevitably drift from
# the Makefile and break local/CI parity, so this workflow deliberately
# stays thin: install toolchains, then delegate to `make check`.
name: check

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "internal/**"
      - "apps/web/**"
      - "packages/cli/**"
      - "packages/opencode-plugin/**"
      - "packages/eslint-config/**"
      - "packages/tsconfig/**"
      - "scripts/**"
      - "docker-compose.dev.yml"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "Makefile"
      - ".github/workflows/check.yml"
  pull_request:
    paths:
      - "server/**"
      - "internal/**"
      - "apps/web/**"
      - "packages/cli/**"
      - "packages/opencode-plugin/**"
      - "packages/eslint-config/**"
      - "packages/tsconfig/**"
      - "scripts/**"
      - "docker-compose.dev.yml"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "Makefile"
      - ".github/workflows/check.yml"

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true
          cache-dependency-path: go.sum

      - uses: pnpm/action-setup@v6
        with:
          version: 10.30.3

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: make check
