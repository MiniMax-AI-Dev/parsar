# The single source of truth for "what does CI run" lives in the Makefile
# (`make check`). That target chains sqlc generate, go test, the migration
# drift check (which spins up postgres via docker compose), and the pnpm
# typecheck. Re-expressing those steps in YAML would inevitably drift from
# the Makefile and break local/CI parity, so this workflow deliberately
# stays thin: install toolchains, then delegate to `make check`.
name: check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          # setup-go's built-in cache covers ~/go/pkg/mod only. The
          # block below adds ~/.cache/go-build so test-binary
          # compilation is incremental across runs — the dominant cost
          # of `make check` is `go test ./server/...`, which builds a
          # large pile of test binaries from scratch every time
          # without it.
          cache: true

      - name: Cache Go build artifacts
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
          # Key on go.sum so a dependency bump invalidates; restore-keys
          # let an unrelated push reuse the previous tree's build cache.
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - uses: pnpm/action-setup@v6
        with:
          version: 10.30.3

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: make check
