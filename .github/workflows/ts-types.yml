# Frontend TS types generation + drift check.
#
# apps/web/src/lib/api-types.generated.ts is a build artifact produced
# by `make ts-types`, which reads docs/openapi/openapi.yaml (itself
# generated by `make openapi` from swaggo annotations on Go handlers)
# and runs it through openapi-typescript.
#
# This workflow regenerates both artifacts in a clean checkout and
# fails the PR if the committed api-types.generated.ts drifts from
# what the pipeline produces — i.e. someone touched a handler or the
# OpenAPI spec without regenerating the TS types.

name: ts-types

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'docs/openapi/**'
      - 'apps/web/src/lib/api-types.generated.ts'
      - '.github/workflows/ts-types.yml'
      - 'Makefile'
  pull_request:
    paths:
      - 'server/**'
      - 'docs/openapi/**'
      - 'apps/web/src/lib/api-types.generated.ts'
      - '.github/workflows/ts-types.yml'
      - 'Makefile'

concurrency:
  group: ts-types-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Regenerate OpenAPI spec
        run: make openapi
      - name: Regenerate TS types
        run: make ts-types
      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- apps/web/src/lib/api-types.generated.ts; then
            echo ""
            echo "::error::apps/web/src/lib/api-types.generated.ts is out of sync with docs/openapi/openapi.yaml."
            echo "Run 'make ts-types' locally (after 'make openapi'), commit the regenerated file, and push."
            exit 1
          fi
