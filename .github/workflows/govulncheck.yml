# govulncheck is sharper than a generic dependency-version scanner: it
# walks the call graph and only flags vulnerabilities whose affected
# symbols are actually reachable from this repo's code. That keeps the
# signal-to-noise ratio high compared to dependabot-style alerts, which
# fire on any vulnerable version regardless of whether we call the bad
# function. The weekly cron exists so newly published CVEs against
# already-pinned dependencies surface even when no PR is in flight.
name: govulncheck

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - ".github/workflows/govulncheck.yml"
  pull_request:
    paths:
      - "server/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - ".github/workflows/govulncheck.yml"
  schedule:
    - cron: "17 8 * * 1"

permissions:
  contents: read

concurrency:
  group: govulncheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      - name: Cache Go build artifacts
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
          # govulncheck does reachability analysis over the full call
          # graph and compiles everything; without ~/.cache/go-build
          # warm, each run pays the full cold-build cost.
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Run govulncheck
        working-directory: server
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
