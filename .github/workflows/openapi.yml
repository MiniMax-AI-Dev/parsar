# OpenAPI spec generation + lint.
#
# docs/openapi/openapi.yaml is a build artifact regenerated by
# `make openapi` (which runs `swag init` over server/**/*.go). This
# workflow:
#   1. Regenerates the spec from Go source in a clean checkout.
#   2. Fails the PR if the committed file drifts from what Go produces
#      — that means someone changed a handler without running
#      `make openapi`, or edited the YAML by hand.
#   3. Runs Redocly lint on the (regenerated) spec as a structural
#      safety net.
#
# When the PR touches only handlers, both jobs run. When it touches
# only redocly.yaml or the workflow itself, only lint runs.

name: openapi

on:
  push:
    branches: [main]
    paths:
      - 'docs/openapi/**'
      - 'redocly.yaml'
      - 'server/**/*.go'
      - '.github/workflows/openapi.yml'
      - 'Makefile'
  pull_request:
    paths:
      - 'docs/openapi/**'
      - 'redocly.yaml'
      - 'server/**/*.go'
      - '.github/workflows/openapi.yml'
      - 'Makefile'

concurrency:
  group: openapi-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Regenerate the spec from the Go source and fail if the committed
  # file has drifted. Uses `make openapi`, the same command developers
  # run locally, so anything green here is reproducible on any clean
  # checkout.
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Regenerate spec
        run: make openapi
      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- docs/openapi/openapi.yaml; then
            echo ""
            echo "::error::docs/openapi/openapi.yaml is out of sync with the swaggo annotations."
            echo "Run 'make openapi' locally, commit the regenerated file, and push."
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@2.35.1 lint docs/openapi/openapi.yaml
