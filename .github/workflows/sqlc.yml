# sqlc generation drift check.
#
# server/internal/db/sqlc/*.go is a build artifact regenerated by
# `make sqlc-generate` from server/internal/db/queries/*.sql. This
# workflow reruns the generator in a clean checkout and fails the PR
# if the committed Go drifts from what sqlc produces — meaning
# someone edited a query without running `make sqlc-generate`, or
# hand-edited the generated file.
#
# Mirrors the pattern in .github/workflows/openapi.yml.

name: sqlc

on:
  push:
    branches: [main]
    paths:
      - 'server/internal/db/**'
      - '.github/workflows/sqlc.yml'
      - 'Makefile'
  pull_request:
    paths:
      - 'server/internal/db/**'
      - '.github/workflows/sqlc.yml'
      - 'Makefile'

concurrency:
  group: sqlc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Regenerate sqlc
        run: make sqlc-generate
      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- server/internal/db/sqlc/; then
            echo ""
            echo "::error::server/internal/db/sqlc/ is out of sync with server/internal/db/queries/*.sql."
            echo "Run 'make sqlc-generate' locally, commit the regenerated files, and push."
            exit 1
          fi
