# Parsar agent_daemon SandboxSet — XL variant (4 vCPU / 50 GiB).
#
# Companion pool to the default `parsar-daemon` SandboxSet
# (4 vCPU / 8 GiB). Agents whose project_agents.config.sandbox_size = "xl"
# are routed to this pool by the server's sandbox provider
# (server/internal/connector/agentdaemon/sandbox_provider.go).
#
# Same container image as the standard pool — only resources differ.
# Both images are baked from infra/sandbox/parsar-daemon-claudecode/Dockerfile.
#
# Usage:
#   kubectl apply -f sandboxset.yaml
#
#   # Check pool status:
#   kubectl -n sandbox-work get sandboxset parsar-daemon-xl
#   kubectl -n sandbox-work get pods -l sandboxset=parsar-daemon-xl

apiVersion: agents.kruise.io/v1alpha1
kind: SandboxSet
metadata:
  name: parsar-daemon-xl
  namespace: sandbox-work
spec:
  # Warm pool size. XL is expensive (50 GiB reservation per pod) so we
  # keep this small — 2 pods means the first two concurrent XL agents
  # get a hot pod, the third triggers the controller to spawn a fresh
  # pod (still much faster than scaling from 0).
  #
  # Cluster reservation: 2 × (4 vCPU + 50 GiB) = 8 vCPU + 100 GiB
  # regardless of whether the pods are in use.
  replicas: 2
  template:
    spec:
      containers:
        - name: sandbox
          # envd is the e2b sandbox daemon. See the standard pool's
          # sandboxset.yaml for details.
          command: ["envd", "-port", "49983"]
          env:
            - name: GODEBUG
              value: multipathtcp=0
            - name: ENVD_DIR
              value: /mnt/envd
          # Keep in sync with the standard SandboxSet
          # (parsar-daemon-claudecode/sandboxset.yaml) — both pools always
          # run the same image, only resource limits differ.
          image: ghcr.io/<your-org>/parsar-sandbox:latest
          resources:
            requests:
              cpu: 4
              memory: 50Gi
            limits:
              cpu: 4
              memory: 50Gi
          ports:
            - name: envd
              containerPort: 49983
          startupProbe:
            failureThreshold: 20
            tcpSocket:
              port: 49983
            initialDelaySeconds: 1
            periodSeconds: 2
            timeoutSeconds: 1
      terminationGracePeriodSeconds: 1
