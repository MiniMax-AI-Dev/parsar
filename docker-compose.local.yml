# Parsar local edition (all-in-one) — Phase 1 deliverable.
#
# One command, single machine, zero secrets to generate:
#
#   docker compose -f docker-compose.local.yml up
#
# Brings up Postgres + a one-shot init (migrate + first-owner bootstrap) +
# parsar-server with mock auth. Open http://127.0.0.1:18080, click
# "Pair new device", copy the single command, run it on THIS host, and your
# local Claude Code / OpenCode / Codex login is paired in.
#
# Profile not fork: this is the SAME image as the self-host deployment
# (deploy/compose/compose.selfhost.yml). Differences live only in this file
# + the env values below. No separate "local" binary or image.
#
# Image source:
#   - Default: GHCR prebuilt image (PARSAR_SERVER_IMAGE below).
#   - Local build fallback (before the tag is published, or to test your
#     own changes):
#       make docker-build PARSAR_IMAGE=parsar PARSAR_IMAGE_TAG=local
#       PARSAR_SERVER_IMAGE=parsar:local docker compose -f docker-compose.local.yml up
#
# Override knobs (all optional — defaults make `up` work with no .env):
#   PARSAR_SERVER_IMAGE   server image ref (default: GHCR latest)
#   PARSAR_LOCAL_PORT     host port for the web UI (default: 18080)
#   PARSAR_PG_PORT        host port for Postgres (default: 15432)

# Explicit project name so the auto-created network is always parsar_default
# regardless of the clone directory name. The sandbox provider hard-codes this
# network below (AGENT_DAEMON_SANDBOX_DOCKER_NETWORK); mismatched names would
# leave every acquired sandbox unable to reach parsar-server.
name: parsar

networks:
  default:
    name: parsar_default

services:
  postgres:
    image: postgres:16-alpine
    container_name: parsar-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: parsar
      POSTGRES_PASSWORD: parsar
      POSTGRES_DB: parsar
    ports:
      - "127.0.0.1:${PARSAR_PG_PORT:-15432}:5432"
    volumes:
      - parsar-local-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parsar -d parsar"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # One-shot: run migrations, then (optionally) provision the first owner.
  # Set PARSAR_OWNER_EMAIL to pre-seed an owner via CLI bootstrap; leave
  # unset to use the web registration form (POST /api/v1/bootstrap).
  # Tolerates exit code 2 (store.ErrBootstrapClosed) so re-running `up` is
  # idempotent. Binaries live on $PATH at /usr/local/bin (WORKDIR is
  # /var/lib/parsar), so they are invoked by bare name, NOT ./parsar-migrate.
  parsar-init:
    image: ${PARSAR_SERVER_IMAGE:-ghcr.io/MiniMax-ai-dev/parsar-server:latest}
    container_name: parsar-local-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://parsar:parsar@postgres:5432/parsar?sslmode=disable
      PARSAR_OWNER_EMAIL: "${PARSAR_OWNER_EMAIL:-}"
      # Passed through so parsar-init can validate it before migrations run.
      # Empty / dev-default triggers the auto-generate + guidance path below.
      PARSAR_MASTER_KEY: "${PARSAR_MASTER_KEY:-}"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # ---- Master key gate ----
        # PARSAR_MASTER_KEY encrypts every workspace-scoped secret in the
        # database (Feishu App Secret, Slack/Discord bot tokens, ...). A
        # public dev-default key or an empty value on a 0.0.0.0-bound LAN
        # deploy would leak that vault to anyone who can read the DB. Fail
        # loud on the well-known dev default; auto-generate + print
        # guidance for empty so first-time `up` still works.
        DEV_DEFAULT_KEY="parsar-dev-master-key-2026"
        if [ "$${PARSAR_MASTER_KEY}" = "$${DEV_DEFAULT_KEY}" ]; then
          echo "═══════════════════════════════════════════════════════════════"
          echo "  ERROR: PARSAR_MASTER_KEY is the public dev default."
          echo ""
          echo "  This key encrypts Feishu / Slack / Discord bot credentials"
          echo "  in the database. Using the repo-visible default on a LAN"
          echo "  deploy leaks the entire secret vault."
          echo ""
          echo "  Fix: remove PARSAR_MASTER_KEY from .env, then re-run"
          echo "  docker compose up — a fresh key is auto-generated and"
          echo "  printed below."
          echo "═══════════════════════════════════════════════════════════════"
          exit 1
        fi
        if [ -z "$${PARSAR_MASTER_KEY}" ]; then
          GENERATED_KEY=$$(head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n')
          echo "═══════════════════════════════════════════════════════════════"
          echo "  PARSAR_MASTER_KEY was unset — auto-generated a fresh key."
          echo ""
          echo "  ⚠️  COPY THIS INTO .env NOW, otherwise the next restart will"
          echo "     generate a different key and every bot credential you"
          echo "     store today will become undecryptable."
          echo ""
          echo "     PARSAR_MASTER_KEY=$${GENERATED_KEY}"
          echo ""
          echo "  (Sleeping 5s so this stays on screen. Ctrl+C to abort.)"
          echo "═══════════════════════════════════════════════════════════════"
          sleep 5
          export PARSAR_MASTER_KEY="$${GENERATED_KEY}"
        fi
        parsar-migrate
        if [ -n "$${PARSAR_OWNER_EMAIL}" ]; then
          parsar-bootstrap \
            --email="$${PARSAR_OWNER_EMAIL}" \
            --workspace="Local Workspace" \
            --name="Local Admin" \
          || [ "$$?" -eq 2 ]
        else
          echo "[parsar-init] PARSAR_OWNER_EMAIL unset — skipping bootstrap; use the web registration form"
        fi
    restart: "no"

  parsar-server:
    image: ${PARSAR_SERVER_IMAGE:-ghcr.io/MiniMax-ai-dev/parsar-server:latest}
    container_name: parsar-local-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      parsar-init:
        condition: service_completed_successfully
    ports:
      - "${PARSAR_BIND_ADDR:-0.0.0.0}:${PARSAR_LOCAL_PORT:-18080}:8080"
    environment:
      DATABASE_URL: postgres://parsar:parsar@postgres:5432/parsar?sslmode=disable
      # Network proxy — only needed if your host requires a proxy for internet
      # access (e.g. pulling MCP packages inside sandbox). Leave empty if not.
      http_proxy: "${HTTP_PROXY:-}"
      https_proxy: "${HTTPS_PROXY:-}"
      no_proxy: "localhost,127.0.0.1,postgres,parsar-server"
      # Auth mode. Default (no .env) = mock auth -> ProfileDev: full cookie
      # login as admin@example.com, no IdP, zero secrets. To test REAL Feishu
      # OIDC against this same 127.0.0.1 stack, drop a gitignored .env next to
      # this file with the real values (compose auto-loads it):
      #
      #   PARSAR_FEISHU_MOCK=false
      #   PARSAR_FEISHU_APP_ID=cli_xxx
      #   PARSAR_FEISHU_APP_SECRET=xxx
      #   PARSAR_FEISHU_VERIFICATION_TOKEN=xxx      # any non-empty value
      #
      #
      # No PARSAR_MASTER_KEY / PARSAR_COOKIE_SECURE needed: a loopback
      # PARSAR_PUBLIC_URL (127.0.0.1) keeps Profile()==ProfileDev even with
      # real Feishu (see config.isLoopback), so the dev master key is
      # auto-seeded and the secure-cookie check is skipped. Then register
      # http://127.0.0.1:18080/api/v1/auth/feishu/callback as a redirect URL
      # in the Feishu console. (PARSAR_DEV_AUTH stays unset: we want real
      # cookie login, not the header bypass.)
      PARSAR_FEISHU_MOCK: "${PARSAR_FEISHU_MOCK:-true}"
      PARSAR_FEISHU_REDIRECT_URI: "${PARSAR_FEISHU_REDIRECT_URI:-}"
      PARSAR_FEISHU_APP_ID: "${PARSAR_FEISHU_APP_ID:-}"
      PARSAR_FEISHU_APP_SECRET: "${PARSAR_FEISHU_APP_SECRET:-}"
      # Any non-empty value satisfies IsWebhookConfigured (needed to boot in
      # real-Feishu mode); must match the Feishu console only when you actually
      # exercise event subscription. Empty in mock mode — ignored there.
      PARSAR_FEISHU_VERIFICATION_TOKEN: "${PARSAR_FEISHU_VERIFICATION_TOKEN:-}"
      # Secure cookie can't ride plain HTTP — set false when the browser
      # dials the raw compose port (127.0.0.1 or PARSAR_HOST_IP over LAN).
      # Set true when a reverse proxy terminates HTTPS in front of this
      # stack. Mock/ProfileDev ignores it entirely.
      PARSAR_COOKIE_SECURE: "${PARSAR_COOKIE_SECURE:-false}"
      # Public URL must match the host port the browser hits so OAuth
      # callbacks AND the minted one-line connect command line up. Kept in
      # sync with the published port via the same variable.
      PARSAR_PUBLIC_URL: "http://${PARSAR_HOST_IP:-127.0.0.1}:${PARSAR_LOCAL_PORT:-18080}"
      # Inter-pod owner-routing URL. The server refuses to boot until this
      # resolves (no fallback to PublicURL/127.0.0.1, which are unsafe under
      # multi-replica load balancing — see resolveAgentDaemonOwnerURL in
      # server/cmd/server/main.go). On this single-node stack the owner is
      # always THIS server, so the URL is stamped but never dialed for
      # forwarding; it just has to point back here on the compose network.
      # Same service-name default the self-host compose uses (profile not
      # fork) — `parsar-server` is this service's network alias.
      PARSAR_AGENT_DAEMON_OWNER_URL: "http://parsar-server:8080"
      # Feishu Bot IM (local websocket path, not webhook — 127.0.0.1 is not
      # reachable by Feishu's HTTPS event delivery). WEBSOCKET turns inbound
      # @Bot messages into gateway runs; OUTBOUND drives the inflight reply
      # cards back. Both read PARSAR_MASTER_KEY via os.Getenv (the dev
      # auto-seed does NOT satisfy them), so it must be set explicitly here.
      # Pinned to the SAME dev default the web admin UI hardcodes
      # (apps/web/src/lib/api-models.ts DEV_MASTER_KEY) so the secret vault
      # stays in sync. Bot App ID/Secret are NOT here — they go through the
      # Web UI bind card into the encrypted vault.
      # PARSAR_MASTER_KEY must be set explicitly. Empty falls through here
      # so parsar-init can auto-generate + print the key on first `up`;
      # parsar-server then refuses to start via config.Validate in
      # production mode (see server/internal/config/validate.go). No dev
      # fallback: leaking the public dev key on a 0.0.0.0-bound LAN
      # deploy would expose the entire secret vault.
      PARSAR_MASTER_KEY: "${PARSAR_MASTER_KEY:-}"
      PARSAR_FEISHU_WEBSOCKET: "true"
      PARSAR_FEISHU_OUTBOUND: "true"
      # Workspace-dimension IM connector reconcilers (workspace_im_connectors
      # table → one Socket Mode / Gateway runner per workspace|app_id, hot-
      # reloading on token rotation). Opt-in gates read in main.go
      # (buildSlackInboundManager / buildDiscordInboundManager); both reuse
      # PARSAR_MASTER_KEY above to decrypt the vaulted bot tokens.
      PARSAR_SLACK_CONNECTORS: "true"
      PARSAR_DISCORD_CONNECTORS: "true"
      # Shared default Bot credentials. Values come from a gitignored .env
      # file next to this compose (NEVER hardcode the App Secret here — this
      # file is repo-tracked). The websocket manager reads these to open the
      # env-backed shared bot long-connection (defaultFeishuSharedBotEnv in
      # server/cmd/server/main.go). Empty default keeps `up` working when the
      # .env is absent (Feishu just stays off).
      PARSAR_FEISHU_DEFAULT_BOT_APP_ID: "${PARSAR_FEISHU_DEFAULT_BOT_APP_ID:-}"
      PARSAR_FEISHU_DEFAULT_BOT_APP_SECRET: "${PARSAR_FEISHU_DEFAULT_BOT_APP_SECRET:-}"
      # Bot's own open_id. Needed so the shared bot recognizes it was the one
      # @-mentioned in a group chat — without it, ShouldSkipGroupWithoutMention
      # drops every group @ (botLocalID=="" → skip). Read from .env.
      PARSAR_FEISHU_DEFAULT_BOT_OPEN_ID: "${PARSAR_FEISHU_DEFAULT_BOT_OPEN_ID:-}"
      # Discord shared bot (Gateway WS, server-initiated — works on 127.0.0.1,
      # no public callback). GATEWAY enables buildDiscordRunner; BOT_TOKEN is
      # required (server refuses to start the runner without it). APP_ID is
      # optional. Reads PARSAR_MASTER_KEY for button/permission routing (already
      # set above). All values from the gitignored .env. ⚠️ MESSAGE CONTENT
      # privileged intent must be ON in the Developer Portal or message bodies
      # come through empty (main.go:1467).
      PARSAR_DISCORD_GATEWAY: "${PARSAR_DISCORD_GATEWAY:-}"
      PARSAR_DISCORD_APP_ID: "${PARSAR_DISCORD_APP_ID:-}"
      PARSAR_DISCORD_BOT_TOKEN: "${PARSAR_DISCORD_BOT_TOKEN:-}"
      # Docker sandbox — Agent runs inside a sandboxed container with
      # Claude Code + OpenCode + Codex + Pi + parsar-daemon. The server
      # calls docker to start / exec / stop sandbox containers via the
      # mounted /var/run/docker.sock below. Build the sandbox image
      # first (README's 5.2 section):
      #   docker build -f infra/sandbox/Dockerfile.local -t parsar-sandbox:local .
      # The network below is pinned to `parsar_default` — the top-level
      # `name: parsar` + `networks:` block at the head of this file
      # guarantees that alias regardless of the clone directory.
      AGENT_DAEMON_SANDBOX_BACKEND: "docker"
      AGENT_DAEMON_SANDBOX_DOCKER_IMAGE: "${AGENT_DAEMON_SANDBOX_DOCKER_IMAGE:-parsar-sandbox:local}"
      AGENT_DAEMON_SANDBOX_DOCKER_NETWORK: "parsar_default"
    group_add:
      - "${DOCKER_GID:-999}"
    volumes:
      - parsar-local-data:/var/lib/parsar
      # Overlay the hand-maintained OpenAPI spec so /docs updates without
      # a full image rebuild. RegisterDocsRoutes re-reads on every request.
      - ./docs/openapi/openapi.yaml:/app/docs/openapi/openapi.yaml:ro
      # Docker sandbox — the server calls `docker` against the host
      # daemon to acquire/release sandbox containers. The GID mapping
      # above (DOCKER_GID) grants the parsar user rights on the socket.
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
    # The image's baked-in HEALTHCHECK probes /healthz with `wget --spider`
    # (an HTTP HEAD), but /healthz is GET-only and answers HEAD with 405 —
    # so the default probe reports the container "unhealthy" even though it
    # serves fine. Override with the same GET probe the self-host compose
    # uses (deploy/compose/compose.selfhost.yml) — profile not fork.
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- --tries=1 --timeout=3 http://127.0.0.1:8080/healthz >/dev/null
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

volumes:
  parsar-local-pg:
  parsar-local-data:
