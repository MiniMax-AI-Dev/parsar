# Parsar configuration example — generic baseline
#
# Usage:
#   1. Copy this file to a location *outside the repo*, e.g.:
#        cp docs/deploy/config.example.yaml ~/.parsar/config.yaml
#      Production deployments typically use /etc/parsar/config.yaml or the
#      secret template of your deploy platform.
#   2. Replace each <placeholder> with your real value (**do not commit
#      these into the repo**).
#   3. Export PARSAR_CONFIG_FILE before starting the server:
#        export PARSAR_CONFIG_FILE=$HOME/.parsar/config.yaml
#        parsar-server
#      Or set the absolute path into the container env in compose / K8s.
#
# Load precedence: built-in defaults < YAML file < environment variables.
# In production, secrets are usually injected via env; the file only holds
# non-sensitive deployment shape (listen address, scopes, runner types, ...).
#
# **No real secrets or real deploy addresses belong in this file.** Real
# tokens, master keys, app secrets, internal domains, etc. only ever live
# in the operator's local shell env or the deploy-platform secret manager.
#
# Companion files:
#   docs/deploy/deploy-runbook.md          — deploy cold-start order
#   docs/deploy/health-and-smoke.md        — /healthz, /readyz, smoke
#   deploy/compose/compose.selfhost.yml    — Docker Compose deploy starting point
#   deploy/compose/.env.example            — env template

server:
  addr: ":8080"
  # Absolute URL visible to the outside world. Feishu / GitHub / Slack OAuth
  # callbacks are built from this. Must be reachable from the user's browser.
  public_url: "https://parsar.example.com"
  # Runtime state directory (audit ingester scratch, per-run opencode scratch,
  # smoke evidence). Must live outside the repo / CWD.
  # Default ~/.parsar; for systemd / containers, set to a managed path such as
  # /var/lib/parsar.
  data_dir: "~/.parsar"

database:
  # Required. Parsar only supports Postgres.
  # The password embedded in the connection string is a secret; prefer the
  # DATABASE_URL env var and keep the YAML to host/db shape only.
  url: "postgres://parsar:CHANGE_ME_TO_REAL_PASSWORD@127.0.0.1:5432/parsar?sslmode=disable"

auth:
  # Must be false in production. The X-Parsar-Dev-User-ID dev shim is for
  # local development only. Validate() rejects prod profile + dev_auth=true
  # at startup.
  dev_auth: false
  cookie:
    # Secure cookies are derived from the deployment profile.
    secure: true

secret:
  # Master key for the secret vault (AES-GCM wraps every workspace secret).
  # Required in production; recommend at least 32 random bytes:
  # openssl rand -hex 32.
  # **Strongly prefer leaving this empty and injecting via env from your
  # deploy platform's secret manager.**
  # Do not rotate this once you go live — there is no in-place re-encrypt
  # tool today, so rotating the key means re-encrypting every workspace
  # secret.
  master_key: ""

gateway:
  feishu:
    # Local dev can enable mock. Must be off in production; startup rejects it.
    mock: false
    # Feishu Open Platform app credentials — all injected via env.
    # See docs/deploy/feishu-prod.md §1 for where to configure them.
    app_id: ""
    app_secret: ""
    redirect_uri: ""
    # The default scope set already covers user.id / user.base / user.email;
    # only fill this when you need to append extra scopes.
    scope: ""
    # Defaults are https://accounts.feishu.cn / https://open.feishu.cn.
    # Override these hosts when behind a reverse proxy or on self-hosted Lark.
    authorize_base: ""
    api_base: ""
    # Feishu event subscription Verification Token / Encrypt Key — env-injected.
    verification_token: ""
    encrypt_key: ""
    # Redirect target after successful login; defaults to "/".
    login_redirect_url: ""

# Runtime profile is currently env-injected, not placed in YAML:
#   PARSAR_RUNTIME_PROFILE=managed
# The server also auto-detects managed once an agent_daemon sandbox provider
# is wired up; the explicit env is mainly a deploy-time fallback. `managed`
# means the deploy platform hosts the cloud sandbox, so workspace admins do
# not have to enter an E2B key in the UI.

# GitHub personal-account connection (OAuth App) is currently env-injected,
# not placed in YAML:
#   PARSAR_GITHUB_CLIENT_ID=<OAuth App client id>
#   PARSAR_GITHUB_CLIENT_SECRET=<OAuth App client secret>
#   PARSAR_GITHUB_REDIRECT_URI=https://parsar.example.com/api/v1/connections/github/callback
#   PARSAR_GITHUB_SCOPE="repo read:user user:email"
# When redirect_uri is empty, the server derives the callback from
# server.public_url automatically.

model:
  # Path to the opencode CLI binary; empty means look it up on $PATH.
  # If the image installs opencode at a non-standard path, put the absolute
  # path here.
  opencode_bin: ""

storage:
  # Object storage — only required when Plugin capability uploads are enabled.
  # If any required field is empty, the client is not built and /uploads/*
  # returns 503; MCP / Skill capability is unaffected.
  # Real credentials always flow through PARSAR_OSS_* env vars; the YAML
  # only carries placeholder hints.
  #
  # The current default implementation uses the Alibaba Cloud OSS SDK; a
  # future ObjectStorage interface will support MinIO / S3 / Cloudflare R2
  # and other S3-compatible backends (see oss-release/issues).
  #
  # Region expects the bare region code (cn-shanghai, cn-hangzhou, ...);
  # do NOT include the oss- prefix — that form (oss-cn-shanghai) only
  # appears inside base_url.
  oss:
    region: ""
    bucket: ""
    access_key_id: ""
    access_key_secret: ""
    # Bucket public origin; concatenated with the object key to produce
    # capability_versions.oss_url. Shape:
    # https://<bucket>.oss-cn-<region>.aliyuncs.com
    base_url: ""
    # Override when going through a reverse proxy or VPC endpoint; leave
    # empty to let the SDK derive it from region.
    endpoint: ""

audit:
  otlp:
    # Embedded OTLP/HTTP receiver. Off by default; only enable when you
    # want to fan audit events out to an OpenTelemetry collector (Grafana /
    # Tempo / Loki / Honeycomb / Datadog).
    # Even when enabled, the canonical audit still writes to audit_records;
    # fan-out failures are logged, not blocking.
    enabled: false
    # Receiver listen address. Default ":4318" (OTel HTTP standard port).
    addr: ":4318"
    # HMAC-SHA256 signing key used to validate the Bearer token reported by
    # the sandbox sidecar. Required when enabled=true (Validate() rejects an
    # empty key); recommend: openssl rand -hex 32.
    # Injected via env.
    signing_key: ""
    # Full URL that external producers (sandboxes, etc.) hit for this
    # receiver. Different from addr: addr is the local bind, whereas
    # external_endpoint is the URL visible from the public network /
    # cluster. Empty → no OTel env is injected at spawn time, so sandboxes
    # will not report automatically.
    external_endpoint: ""
    # URL of your own OTel collector to fan audit events out to.
    # Empty = no fan-out.
    fanout_endpoint: ""
