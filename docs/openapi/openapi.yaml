  /api/v1/me/credentials/{credentialID}:
    delete:
      description: Soft-deletes a credential owned by the caller.
      operationId: deleteDevMyCredential
      parameters:
      - description: Credential UUID
        in: path
        name: credentialID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Deleted credential
          schema:
            $ref: '#/definitions/dev.userCredentialResponse'
        "400":
          description: Invalid credential_id
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: unauthenticated
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Credential belongs to another user
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed credential APIs are disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a personal credential
      tags:
      - me
    patch:
      consumes:
      - application/json
      description: Updates the display name and/or plaintext value of a credential
        owned by the caller. Empty plaintext leaves the encrypted value unchanged.
      operationId: patchDevMyCredential
      parameters:
      - description: Credential UUID
        in: path
        name: credentialID
        required: true
        type: string
      - description: Partial credential update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.credentialBody'
      produces:
      - application/json
      responses:
        "200":
          description: Updated credential
          schema:
            $ref: '#/definitions/dev.userCredentialResponse'
        "400":
          description: Malformed body or invalid credential_id
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: unauthenticated
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Credential belongs to another user
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed credential APIs are disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Patch a personal credential
      tags:
      - me
  /api/v1/me/workspaces:
    get:
      description: Returns workspaces the caller is a member of.
      operationId: listDevMyWorkspaces
      produces:
      - application/json
      responses:
        "200":
          description: Workspace list
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Caller is not authenticated
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List my workspaces
      tags:
      - me
  /api/v1/memories:
    get:
      description: Returns memories in the requested scope. scope=user returns the
        caller's private bucket; scope=workspace requires membership and a workspace_id
        query param.
      operationId: listMemories
      parameters:
      - description: memory scope
        enum:
        - user
        - workspace
        in: query
        name: scope
        required: true
        type: string
      - description: workspace id (required when scope=workspace)
        in: query
        name: workspace_id
        type: string
      - description: memory type filter
        enum:
        - user
        - feedback
        - workspace
        - reference
        in: query
        name: memory_type
        type: string
      - description: comma-separated tag filter
        in: query
        name: tag
        type: string
      - description: page size (1-500, default 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List memories
      tags:
      - memories
    post:
      consumes:
      - application/json
      description: Persists a user- or workspace-scope memory. scope=user requires
        only a session; scope=workspace requires non-viewer workspace membership.
      operationId: createMemory
      parameters:
      - description: memory payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/specmem.createMemoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/specmem.memoryDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a memory
      tags:
      - memories
  /api/v1/memories/{memoryID}:
    delete:
      description: Deletes a memory. Cross-owner or cross-workspace deletes are masked
        as 404.
      operationId: deleteMemory
      parameters:
      - description: memory id
        in: path
        name: memoryID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a memory
      tags:
      - memories
    patch:
      consumes:
      - application/json
      description: Mutates a memory's content. Cross-owner or cross-workspace access
        is masked as 404.
      operationId: updateMemory
      parameters:
      - description: memory id
        in: path
        name: memoryID
        required: true
        type: string
      - description: new content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/specmem.updateMemoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/specmem.memoryDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a memory
      tags:
      - memories
  /api/v1/parsar-daemon/download:
    get:
      description: Serves the parsar-daemon binary for the requested os/arch pair
        from the image's baked-in binary directory. Unauthenticated — the pairing
        token is what gates the actual connect.
      operationId: downloadParsarDaemon
      parameters:
      - description: target GOOS
        enum:
        - darwin
        - linux
        in: query
        name: os
        required: true
        type: string
      - description: target GOARCH
        enum:
        - amd64
        - arm64
        in: query
        name: arch
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: parsar-daemon binary stream
          schema:
            type: file
        "400":
          description: os/arch not in the accepted allowlist
          schema:
            type: string
        "404":
          description: no binary for that os/arch in this image
          schema:
            type: string
      summary: Download parsar-daemon binary
      tags:
      - runtimes
  /api/v1/parsar-daemon/install.sh:
    get:
      description: Returns the shell script that fetches and installs the parsar-daemon
        binary. Unauthenticated — the script itself has no secrets.
      operationId: installParsarDaemonScript
      produces:
      - text/plain
      responses:
        "200":
          description: install script body
          schema:
            type: string
      summary: Serve parsar-daemon install script
      tags:
      - runtimes
  /api/v1/runtimes/{runtimeID}/heartbeat:
    post:
      description: Called by the runner daemon to refresh last_heartbeat_at and flip
        liveness to online. Requires the bearer credential minted by POST /api/v1/runtimes/pair.
      operationId: runnerHeartbeat
      parameters:
      - description: Runtime UUID
        in: path
        name: runtimeID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Heartbeat accepted, current liveness
          schema:
            $ref: '#/definitions/runtime.heartbeatResponse'
        "400":
          description: Missing runtime id
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Missing / invalid bearer credential
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Store error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Runtime heartbeat
      tags:
      - runtimes
  /api/v1/runtimes/pair:
    post:
      consumes:
      - application/json
      description: Consumes a pairing token minted by POST /api/v1/workspaces/{workspaceID}/runtimes
        and returns the runner credential used to authenticate subsequent heartbeats.
        Open endpoint — the daemon has no credential yet.
      operationId: pairRuntime
      parameters:
      - description: Pairing token exchange
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/runtime.pairRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Runtime promoted and runner credential minted
          schema:
            $ref: '#/definitions/runtime.pairResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Pairing token invalid or expired
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Credential mint or persist failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Complete runtime pairing
      tags:
      - runtimes
  /api/v1/scheduled-tasks/{taskID}:
    delete:
      description: Soft-deletes the scheduled task. Idempotent; caller must be a workspace
        member with edit rights.
      operationId: deleteDevScheduledTask
      parameters:
      - description: Scheduled task UUID
        in: path
        name: taskID
        required: true
        type: string
      responses:
        "204":
          description: Scheduled task deleted
        "400":
          description: task_id must be a valid uuid
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is a viewer or not a workspace member
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Scheduled task not found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed APIs are disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a scheduled task
      tags:
      - scheduled-tasks
    get:
      description: Returns the scheduled task detail. Caller must be a member of the
        workspace owning the task.
      operationId: getDevScheduledTask
      parameters:
      - description: Scheduled task UUID
        in: path
        name: taskID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Scheduled task
          schema:
            additionalProperties: true
            type: object
        "400":
          description: task_id must be a valid uuid
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not a workspace member
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Scheduled task not found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed APIs are disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a scheduled task
      tags:
      - scheduled-tasks
    patch:
      consumes:
      - application/json
      description: Overwrites the scheduled task's name/prompt/cron/timezone/enabled
        fields; next_run_at is recomputed from cron_expr + timezone. Caller must be
        a workspace member with edit rights.
      operationId: updateDevScheduledTask
      parameters:
      - description: Scheduled task UUID
        in: path
        name: taskID
        required: true
        type: string
      - description: Scheduled task update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.scheduledTaskUpdateBody'
      produces:
      - application/json
      responses:
        "200":
          description: Updated scheduled task
          schema:
            additionalProperties: true
            type: object
        "400":
          description: task_id invalid, body invalid, or cron_expr/timezone bad
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is a viewer or not a workspace member
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Scheduled task not found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed APIs are disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a scheduled task
      tags:
      - scheduled-tasks
  /api/v1/scheduled-tasks/{taskID}/run-now:
    post:
      description: Enqueues an out-of-band execution of the task, independent of cron
        cadence. 409 if another run is already active for the same task.
      operationId: runDevScheduledTaskNow
      parameters:
      - description: Scheduled task UUID
        in: path
        name: taskID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Run enqueued; response carries run_id
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: task_id must be a valid uuid
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is a viewer or not a workspace member
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Scheduled task not found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: A run is already active for this task
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed APIs are disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Trigger a scheduled task immediately
      tags:
      - scheduled-tasks
  /api/v1/scheduled-tasks/{taskID}/runs:
    get:
      description: Returns up to 50 most recent agent_run rows spawned by this scheduled
        task. Caller must be a workspace member.
      operationId: listDevScheduledTaskRuns
      parameters:
      - description: Scheduled task UUID
        in: path
        name: taskID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Recent runs for the scheduled task
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "400":
          description: task_id must be a valid uuid
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not a workspace member
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Scheduled task not found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed APIs are disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List runs for a scheduled task
      tags:
      - scheduled-tasks
  /api/v1/users/search:
    get:
      description: Searches directory users by name, email, or handle. Used for member
        invite pickers.
      operationId: searchDevUsers
      parameters:
      - description: Search keyword
        in: query
        name: q
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User list
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Caller is not authenticated
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Search users
      tags:
      - me
  /api/v1/workspaces:
    post:
      consumes:
      - application/json
      description: Creates a new workspace and adds the caller as the initial owner.
      operationId: createDevWorkspace
      parameters:
      - description: Workspace payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.createWorkspaceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created workspace
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Caller is not authenticated
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a workspace
      tags:
      - workspaces
  /api/v1/workspaces/{workspaceID}:
    patch:
      consumes:
      - application/json
      description: Partially updates a workspace's mutable fields. Owner/admin only.
      operationId: updateDevWorkspace
      parameters:
      - description: Workspace UUID
        in: path
        name: workspaceID
        required: true
        type: string
      - description: Workspace update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.updateWorkspaceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated workspace
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid body or UUID
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not workspace owner/admin
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a workspace
      tags:
      - workspaces
  /api/v1/workspaces/{workspaceID}/agent-runs:
    get:
      description: Returns agent-run rows for the workspace. Caller must be a workspace
        member.
      operationId: listDevWorkspaceAgentRuns
      parameters:
      - description: Workspace UUID
        in: path
        name: workspaceID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Agent run rows
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid UUID
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not a workspace member
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List workspace agent runs
      tags:
      - agent-runs
  /api/v1/workspaces/{workspaceID}/agent-runs/{runID}/events:
    get:
      description: Returns the persisted lifecycle events (message deltas, tool calls,
        permissions, run.* markers) for the run. Supports after_sequence for incremental
        polling.
      operationId: listDevAgentRunEvents
      parameters:
      - description: Workspace UUID
        in: path
        name: workspaceID
        required: true
        type: string
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      - description: Only return events with sequence > this value
        in: query
        name: after_sequence
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: '{events: [...] }'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: workspace_id or run_id is not a valid uuid, or after_sequence
            is negative
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not a workspace member
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Run not found or not part of workspace
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed read APIs are disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List agent run lifecycle events
      tags:
      - agent-runs
  /api/v1/workspaces/{workspaceID}/agents:
    get:
      description: Returns agents the caller can address in the given workspace. By
        default only enabled/active agents; pass include_disabled=true for the admin
        view.
      operationId: listDevAgents
      parameters:
      - description: Workspace UUID
        in: path
        name: workspaceID
        required: true
        type: string
      - description: Include disabled/archived agents in the response
        in: query
        name: include_disabled
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Active workspace agents with profile basics
          schema:
            additionalProperties: true
            type: object
        "400":
          description: workspace_id must be a valid uuid
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not an active workspace member
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed read APIs are disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List active agents in a workspace
      tags:
      - agents
    post:
      consumes:
      - application/json
      description: Creates an agent under the given workspace. Owner/admin only. inline_new_secrets
        are materialised into the shared secret vault before the agent is persisted;
        any binding entries in config are patched with the resolved ids.
      operationId: createDevAgent
      parameters:
      - description: Workspace UUID
        in: path
        name: workspaceID
        required: true
        type: string
      - description: Agent create payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.createAgentBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created agent
          schema:
            additionalProperties: true
            type: object
        "400":
          description: workspace_id must be a valid uuid, or body invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not workspace owner/admin
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Immutable field or unknown capability
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create an agent in a workspace
      tags:
      - agents
  /api/v1/workspaces/{workspaceID}/agents/{agentID}/builtin-capabilities/{key}:
    put:
      consumes:
      - application/json
      description: Toggles a runtime-injected built-in on/off for one agent. Only
        the agent creator may change it. The key must be a known built-in.
      operationId: setDevAgentBuiltinCapability
      parameters:
      - description: Workspace UUID
        in: path
        name: workspaceID
        required: true
        type: string
      - description: Agent UUID
        in: path
        name: agentID
        required: true
        type: string
      - description: Built-in capability key (e.g. parsar_chat_history)
        in: path
        name: key
        required: true
        type: string
      - description: Enabled flag
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.builtinCapabilityBody'
      produces:
      - application/json
      responses:
        "200":
          description: agent_id, builtin_key, enabled
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid UUID or malformed body
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Not agent creator
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Unknown builtin key or agent not found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed capability APIs are disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Toggle a built-in capability on an agent
      tags:
      - capabilities
  /api/v1/workspaces/{workspaceID}/agents/{agentID}/capabilities:
    get:
      description: Returns the capabilities installed on the agent (own + marketplace
        + built-ins) and what else is available to install from the workspace and
        the marketplace.
      operationId: listDevAgentCapabilities
      parameters:
      - description: Workspace UUID
        in: path
        name: workspaceID
        required: true
        type: string
      - description: Agent UUID
        in: path
        name: agentID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: workspace_id, agent_id, installed, available, marketplace_available
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid UUID
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not an active workspace member
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Agent not found in this workspace
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed capability APIs are disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List agent capabilities
      tags:
      - capabilities
