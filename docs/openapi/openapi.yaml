          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Workspace not found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed runtime credential is disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Clear the workspace runtime credential
      tags:
      - runtimes
    put:
      consumes:
      - application/json
      description: Atomic upsert of the workspace's sandbox (E2B) runtime credential.
        Soft-deletes any prior row, encrypts the api_key with PARSAR_MASTER_KEY, then
        flips workspaces.config.runtime_credential_secret_id. Owner/admin only.
      operationId: putDevWorkspaceRuntimeCredential
      parameters:
      - description: Workspace UUID
        in: path
        name: workspaceID
        required: true
        type: string
      - description: Credential payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.runtimeCredentialBody'
      produces:
      - application/json
      responses:
        "200":
          description: Credential registered
          schema:
            $ref: '#/definitions/dev.runtimeCredentialResponse'
        "400":
          description: workspace_id invalid, body invalid, or api_key empty
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not workspace owner/admin
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Workspace not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to encrypt or persist credential
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database or PARSAR_MASTER_KEY not configured
          schema:
            additionalProperties:
              type: string
            type: object
