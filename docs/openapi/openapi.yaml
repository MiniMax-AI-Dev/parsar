  /api/v1/conversations/{conversationID}/runs/{runID}/stream:
    get:
      operationId: streamDevConversationAgentRun
      summary: Subscribe to session-level agent run SSE events
      description: |
        Server-Sent Events endpoint for one conversation agent_run. Each SSE frame uses `event: <type>` and `data: <JSON>` with the same lower_snake_case wire shape as `/dev/connectors/opencode/stream`: `type`, `sequence`, `delta`, `final`, `tool`, `permission`, and `emitted_at`. Terminal runs may still be subscribed to; the in-memory broker replays its latest 64 PromptEvent frames when available, so a late subscriber can still receive tail deltas and the final `done` event.
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: runID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE stream of PromptEvent frames
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE frames. The `data:` payload is a JSON object matching StreamEvent.
        '400':
          description: Malformed conversation or run UUID
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/workspaces/{workspaceID}/conversations:
    get:
      operationId: listDevConversations
      summary: List active conversations within a workspace
      description: |
        Conversations are ordered by most recent activity (last message created_at, falling back to conversation created_at) and include lightweight last-message preview metadata for sidebar rendering.

        Each item includes derived fields `primary_agent_id` and `primary_agent_name` resolved from `metadata.primary_agent_id` via a JOIN against `agents`. Both fields are empty strings when the conversation is channel-style (no agent bound) or when the bound agent has been soft-deleted.

        Filter by `agent_id` query parameter to scope the list to a single 1v1 DM thread group (the "按 agent 看会话" sidebar view).
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
        - name: agent_id
          in: query
          required: false
          description: |
            When set, only conversations whose metadata.primary_agent_id matches are returned.

            Validation: must be a syntactically valid UUID — malformed values
            return 422. The server does NOT validate that the UUID points to
            an active agent in this workspace (intentional: front-end
            picks the value from a dropdown of active agents, and skipping the
            extra lookup keeps the filter cheap). Foreign / inactive / unknown
            agent_id values simply return an empty list — the empty result
            does not distinguish "this agent has no conversations" from
            "this agent does not exist in the workspace".
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        '200':
          description: Workspace conversations ordered by recent activity with message_count, last_message_*, and primary_agent_* fields
        '404':
          description: Unknown active workspace
        '422':
          description: agent_id is not a valid UUID
        '503':
          description: Database-backed read APIs are disabled
    post:
      operationId: createDevConversation
      summary: Create a new conversation within a workspace
      description: |
        Creates a workspace-scoped conversation. `surface` defaults to "web" and `form` defaults to the surface-appropriate value ("thread" for web, "group" for im, "oneshot" for api) when omitted.

        When `agent_id` is provided, the value is validated against `agents` (must be active and belong to the same workspace) and persisted as `metadata.primary_agent_id`. This binds the conversation to a single primary agent for 1v1 DM display in the admin UI. The conversations table schema is unchanged — the binding lives in jsonb metadata, keeping the table channel-friendly for future multi-agent forms.

        The response carries the derived `primary_agent_id` / `primary_agent_name` fields identical to GET responses, so callers can render the sidebar entry immediately without a follow-up GET.
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Conversation title. Defaults to "未命名会话" when omitted or blank.
                surface:
                  type: string
                  enum: [web, im, api]
                  default: web
                  description: Origin channel — WHERE the conversation lives. Replaces the legacy `type` column (which mixed surface + form).
                form:
                  type: string
                  enum: [thread, group, dm, oneshot]
                  description: Conversation shape — HOW participants interact. Defaults to `thread` for web, `group` for im, `oneshot` for api when omitted.
                agent_id:
                  type: string
                  format: uuid
                  description: Optional agent id to bind as the conversation's primary agent. Persisted to metadata.primary_agent_id. When omitted, the conversation has no primary agent (channel-style, future-compatible).
                metadata:
                  type: object
                  additionalProperties: true
                  description: Free-form metadata. The `primary_agent_id` key is reserved — set `agent_id` at the top level instead, the server merges it into metadata after validation.
      responses:
        '201':
          description: Conversation created, response carries derived primary_agent_id and primary_agent_name fields
        '400':
          description: Invalid workspace UUID, invalid JSON, or invalid conversation surface/form
        '404':
          description: Unknown active workspace
        '422':
          description: agent_id is malformed (ErrInvalidInput) or does not belong to an active agent in this workspace (ErrUnknownMention)
        '503':
          description: Database-backed conversation creation is disabled
  /api/v1/conversations/{conversationID}:
    get:
      operationId: getDevConversation
      summary: Read a single conversation summary
      description: |
        Returns basic conversation metadata without the message timeline (use /api/v1/conversations/{conversationID}/timeline for the full message history).

        Includes derived `primary_agent_id` and `primary_agent_name` fields resolved from `metadata.primary_agent_id` via a JOIN. Empty strings when no primary agent is bound or when the bound agent has been soft-deleted.
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation summary
        '404':
          description: Unknown active conversation
        '503':
          description: Database-backed read APIs are disabled
    patch:
      operationId: updateDevConversationTitle
      summary: Rename a conversation
      description: |
        Updates the user-visible title of the conversation. Only the `title`
        field is editable today — conversation surface/form, primary agent
        binding, and metadata.primary_agent_id remain server-managed and
        immutable on this endpoint. Title is trimmed and capped at 200
        characters. Returns the same shape as GET
        /api/v1/conversations/{conversationID} so the client can drop the
        response into react-query cache without remapping.
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
      responses:
        '200':
          description: Conversation with updated title
        '400':
          description: Invalid conversation_id or malformed JSON
        '403':
          description: Caller is not a member of the conversation's workspace
        '404':
          description: Unknown active conversation
        '422':
          description: Empty / too-long title
        '503':
          description: Database-backed write APIs are disabled
    delete:
      operationId: deleteDevConversation
      summary: Soft-delete a conversation
      description: |
        Soft-deletes the conversation (sets deleted_at). Every list / get /
        timeline path filters `deleted_at is null` so the conversation
        disappears from user-facing surfaces immediately while audit and
        agent_run references stay intact. Idempotent — a second call on the
        same id returns 404.
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Conversation soft-deleted
        '400':
          description: Invalid conversation_id
        '403':
          description: Caller is not a member of the conversation's workspace
        '404':
          description: Unknown active conversation
        '503':
          description: Database-backed write APIs are disabled
  /api/v1/agent-runs/{runID}:
    get:
      operationId: getDevAgentRun
      summary: Read one agent run detail
      description: Includes usage rows for completed runs and user_facing_reason on failed runs.
      parameters:
        - name: runID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Agent run detail with handoff linkage, output message, artifact basics, runtime snapshot, and related usage rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunDetail'
        '404':
          description: Unknown active agent run
        '503':
          description: Database-backed read APIs are disabled
  /api/v1/agent-runs/{runID}/requeue:
    post:
      operationId: requeueDevAgentRun
      summary: Requeue a failed agent run for dev retry
      description: Dev-only explicit retry endpoint. Only failed runs can be requeued; it resets status to queued, clears started_at/finished_at, records retry metadata, and writes an agent_run.requeued audit event. It does not automatically retry or create a new run.
      parameters:
        - name: runID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Failed run was requeued
        '400':
          description: Malformed run UUID or invalid JSON
        '403':
          description: Caller is not a member of the run workspace or lacks retry role
        '404':
          description: Unknown agent run
        '409':
          description: Run is not failed and cannot be requeued
        '503':
          description: Database-backed retry is disabled
  /api/v1/agent-runs/{runID}/cancel:
    post:
      operationId: cancelDevAgentRun
      summary: Cancel an in-flight agent run
      description: Cancels a running run, best-effort aborts the owning OpenCode session, marks the run cancelled, and emits an agent_run.cancelled audit event. Already terminal runs return 422.
      parameters:
        - name: runID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Run was cancelled
        '400':
          description: Malformed run UUID or invalid JSON
        '403':
          description: Caller is not a workspace member
        '404':
          description: Unknown agent run
        '422':
          description: Run is already completed, failed, or cancelled
        '503':
          description: Database-backed cancel is disabled
  /api/v1/workspaces/{workspaceID}/agent-runs:
    get:
      operationId: listDevAgentRuns
      summary: List workspace agent runs, optionally filtered by status
      description: Run summaries include user_facing_reason on failed runs so a Chinese-readable error sentence is available alongside the raw status.
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
        - name: status
          in: query
