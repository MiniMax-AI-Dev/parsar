        '503':
          description: Database-backed read APIs are disabled
  /api/v1/workspaces/{workspaceID}/agent-runs/{runID}/events:
    get:
      operationId: listDevAgentRunEvents
      summary: List persisted events for one agent run
      description: |
        Dev-only Run Detail Steps read API. Returns the persisted
        `agent_run_events` rows for a run in ascending sequence order.
        The `after_sequence` cursor lets the admin UI poll while a run is
        still active without using SSE. The run must belong to `workspaceID`;
        workspace mismatches and unknown runs return 404.
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
        - name: runID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: after_sequence
          in: query
          required: false
          description: Return only events with sequence greater than this non-negative cursor.
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
      responses:
        '200':
          description: Persisted run events ordered by sequence ascending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunEventsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Unknown run, unknown workspace, or run/workspace mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '503':
          description: Database-backed read APIs are disabled
  /api/v1/workspaces/{workspaceID}/audit-records:
    get:
      operationId: listDevAuditRecords
      summary: List workspace audit records
      description: |
        Dev-only governance read API backed by the unified `audit_records`
        table. Returns events from the 5-category source taxonomy
        (identity / admin / runtime / approval / data) for the given
        active workspace, ordered by `occurred_at` then `id` descending.
        Unknown active workspaces return 404; malformed workspace IDs return 400.
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
        - name: source
          in: query
          required: false
          description: Filter by 5-category audit source.
          schema:
            type: string
            enum: [identity, admin, runtime, approval, data]
        - name: event_type
          in: query
          required: false
          description: Exact event_type match (e.g. workspace_member.added, agent_run.completed, permission_request.decided).
          schema:
            type: string
        - name: target_type
          in: query
          required: false
          schema:
            type: string
        - name: target_id
          in: query
          required: false
          description: Restrict to a specific target's events.
          schema:
            type: string
            format: uuid
        - name: actor_id
          in: query
          required: false
          description: Restrict to events emitted by a specific actor.
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        '200':
          description: Workspace audit records ordered by newest first
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace_id:
                    type: string
                    format: uuid
                  source:
                    type: string
                  event_type:
                    type: string
                  target_type:
                    type: string
                  audit_records:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          format: int64
                        occurred_at:
                          type: string
                          format: date-time
                        source:
                          type: string
                          enum: [identity, admin, runtime, approval, data]
                        event_type:
                          type: string
                        actor_type:
                          type: string
                          enum: [user, agent, system, external]
                        actor_id:
                          type: string
                          format: uuid
                        target_type:
                          type: string
                        target_id:
                          type: string
                          format: uuid
                        workspace_id:
                          type: string
                          format: uuid
                        payload:
                          type: object
                          additionalProperties: true
        '400':
          description: Malformed workspace UUID
        '404':
          description: Unknown active workspace
        '503':
          description: Database-backed read APIs are disabled
  /api/v1/workspaces/{workspaceID}/connectors:
    get:
      operationId: listDevConnectors
      summary: List connector types in use by a workspace
      description: |
        Dev-only registry-view endpoint for the admin Connectors page.
        There is no `connectors` table by design — the connector identity
        lives on each Agent's `connector_type` field. This endpoint
