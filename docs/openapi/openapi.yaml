    AgentRunRuntimeSnapshot:
      type: object
      description: |
        Read-side execution snapshot for the run. For newly dispatched
        agent_daemon runs, the server persists this under
        agent_runs.metadata.execution_snapshot after the concrete runtime is
        resolved. Older runs still render from the run row, runtime row,
        agent execution config, and connector binding metadata.
      properties:
        id:
          type: string
          format: uuid
          description: Runtime row id recorded on the run, when available.
        name:
          type: string
        type:
          type: string
          description: Runtime type such as `agent_daemon`, `sandbox`, or `external`.
        provider:
          type: string
        connector_type:
          type: string
          description: Connector protocol used by this run, such as `agent_daemon` or `http`.
        agent_kind:
          type: string
          description: Daemon adapter used inside `agent_daemon`, such as `claude_code` or `opencode`.
        runtime_mode:
          type: string
          description: Daemon-level execution mode such as `local`, `sandbox`, or `external`.
        execution_place:
          type: string
          description: "Product-level runtime environment: `cloud_sandbox`, `local_device`, or `external_agent`."
        governance_mode:
          type: string
          description: "Governance boundary for this run, such as `managed`, `external_byo`, or `external`."
        device_id:
          type: string
          description: Agent Daemon device id / runtime id, when known.
        sandbox_id:
          type: string
          description: Sandbox provider id, when the run can be tied to one.
        managed_model_id:
          type: string
          format: uuid
          description: Parsar-managed model id injected into the agent, when configured.
        capabilities:
          type: object
          additionalProperties:
            type: boolean
          description: Runtime capabilities captured for this run, keyed by capability name.
        liveness:
          type: string
        hostname:
          type: string
        version:
          type: string
        last_heartbeat_at:
          type: string
          format: date-time
          nullable: true
        working_directory:
          type: string
          description: Absolute or `~/`-prefixed working directory snapshot for this run.
        captured_at:
          type: string
          format: date-time
          nullable: true
          description: Time when the server persisted the per-run execution snapshot.
    AgentRunDetail:
      allOf:
        - $ref: '#/components/schemas/AgentRunSummary'
        - type: object
          required: [requested_by_type, metadata, updated_at, artifacts, usage, events]
          properties:
            requested_by_type:
              type: string
            requested_by_id:
              type: string
              format: uuid
              nullable: true
            external_run_id:
              type: string
            metadata:
              type: object
              additionalProperties: true
            transcript:
              type: string
            updated_at:
              type: string
              format: date-time
            runtime:
              $ref: '#/components/schemas/AgentRunRuntimeSnapshot'
            output_message:
              $ref: '#/components/schemas/AgentRunOutputMessage'
            artifacts:
              type: array
              items:
                $ref: '#/components/schemas/AgentRunArtifact'
            usage:
              type: array
              items:
                $ref: '#/components/schemas/AgentRunUsageRow'
            events:
              type: array
              items:
                $ref: '#/components/schemas/AgentRunEvent'
    AgentRunEventsResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/AgentRunEvent'
    AgentRunEvent:
      type: object
      required: [id, sequence, event_kind, payload, occurred_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        sequence:
          type: integer
          format: int64
          minimum: 1
        event_kind:
          type: string
          enum:
            - message.delta
            - message.complete
            - tool.call
            - tool.result
            - permission.asked
            - permission.replied
            - model.changed
            - session.error
            - run.started
            - run.completed
            - run.failed
            - run.cancelled
            - run.requeued
        payload:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    MessageSummary:
      type: object
      required: [id, workspace_id, conversation_id, sender_type, sender_id, kind, content_format, content, metadata, created_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        sender_type:
          type: string
          enum: [user, agent, system]
        sender_id:
          type: string
          format: uuid
        kind:
          type: string
          description: |
            Message intent / WHAT. Examples: `message`, `runtime_error`,
            `permission_request`, `tool_call`. Replaces the legacy
            `message_type` column (which mixed kind + format).
        content_format:
          type: string
          enum: [text, markdown, json, html]
          description: |
            HOW to render `content`. Separate from `kind` so a
            `runtime_error` rendered as markdown vs plain text is the
            same kind with different format.
        content:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    WorkspaceSettingsResponse:
      type: object
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
          format: uuid
    UpdateWorkspaceSettingsRequest:
      type: object
      additionalProperties: true
    InitialAgentCapabilityRequest:
      type: object
      required: [capability_version_id]
      properties:
        capability_version_id:
          type: string
          format: uuid
        configuration:
          type: object
          additionalProperties: true
          default: {}
    CreateAgentRequest:
      type: object
      required: [name, connector_type]
      properties:
        name:
          type: string
        description:
          type: string
        connector_type:
          type: string
          enum: [agent_daemon, http]
        system_prompt:
          type: string
        default_model_id:
          type: string
          format: uuid
        capabilities:
          type: array
          items:
            type: string
          description: Legacy display/config snapshot of capability names. New create flows should also send initial_capabilities to bind concrete versions.
        initial_capabilities:
          type: array
          description: Capability versions to enable on the new agent during the same create transaction. The UI defaults each selected capability to its latest_version_id.
          items:
            $ref: '#/components/schemas/InitialAgentCapabilityRequest'
        visibility:
          type: string
          enum: [workspace, tenant, public]
          default: workspace
          description: Who can invoke this Agent. Defaults to workspace.
        runtime:
          type: string
          enum: [sandbox, local]
          description: |
            Retired server-side runtime selector. It is rejected on create;
            agent_daemon execution details live in config.daemon_mode,
            config.agent_kind, and config.device_id.
        config:
          type: object
          additionalProperties: true
          description: |
            Agent execution config. For connector_type=agent_daemon
            this may include daemon_mode (local|sandbox), agent_kind
            (claude_code or opencode today; codex/pi_agent later), device_id for
            daemon_mode=local, and work_dir.
        slug:
          type: string
          description: Optional explicit stable identifier. Omit to let the server allocate a random system slug (`agent-<12hex>`).
    UpdateAgentRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        connector_type:
          type: string
          enum: [agent_daemon, http]
        system_prompt:
          type: string
        default_model_id:
          type: string
          format: uuid
        capabilities:
          type: array
          items:
            type: string
        config:
          type: object
          additionalProperties: true
          description: Agent execution config.
        slug:
          type: string
          description: Immutable. Supplying this field returns 422.
        workspace_id:
          type: string
          format: uuid
          description: Immutable. Supplying this field returns 422.
    UpdateAgentFeishuConnectorRequest:
      type: object
      description: |
        Bind/rebind this Agent to a Feishu Bot self-built app. See
        docs/feishu-routing.md §6.2.
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: |
            Master switch. When true, app_id + app_secret_ref are required.
            verification_token_ref is required only in webhook mode.
        app_id:
          type: string
          description: Feishu Bot app id (e.g. `cli_xxx`).
        app_secret_ref:
          type: string
          description: Secret vault id holding the Bot app secret.
        verification_token_ref:
          type: string
          description: Secret vault id holding the webhook verification token.
        encrypt_key_ref:
          type: string
          description: |
            Optional. Secret vault id holding the event encrypt key.
            Required only when Feishu event encryption is on.
        bot_open_id:
          type: string
          description: |
            Optional. The bot's own open_id, used to dedup self-sent
            messages so the bot doesn't reply to its own posts.
        event_mode:
          type: string
          enum: [webhook, websocket]
          default: webhook
          description: |
            `webhook` is the manual configuration fallback and requires
            verification_token_ref when enabled. `websocket` is written by QR
            provisioning and only requires app_secret_ref.
        routing_mode:
          type: string
          enum: [direct, shared]
          default: direct
          description: |
            `direct` routes inbound messages to this Agent. `shared` makes
            this Agent a shared Bot host: `/list` shows visible Agents,
            `/select` stores the chat's current target, and ordinary
            messages are dispatched to that selected Agent while replies use
            this Bot app_id.
    FeishuProvisionBeginResult:
      type: object
      required: [device_code, user_code, verification_uri, verification_uri_complete, expires_in, interval]
      properties:
        device_code:
          type: string
        user_code:
          type: string
        verification_uri:
          type: string
          format: uri
        verification_uri_complete:
          type: string
          format: uri
        expires_in:
          type: integer
          minimum: 1
        interval:
          type: integer
          minimum: 1
    FeishuProvisionPollRequest:
      type: object
      required: [device_code]
      properties:
        device_code:
          type: string
        interval_sec:
          type: integer
          minimum: 1
          description: Current polling interval returned by begin or the previous poll.
        tenant_brand:
          type: string
          description: Optional Feishu/Lark tenant brand hint returned by registration.
    FeishuProvisioningResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, success, error]
        begin:
          $ref: '#/components/schemas/FeishuProvisionBeginResult'
        next_interval_sec:
          type: integer
          minimum: 1
        error:
          type: string
          description: Upstream registration error code when status=error.
        description:
          type: string
          description: Human-readable error detail when status=error.
        app_id:
          type: string
          description: Provisioned Feishu Bot app id when status=success.
        app_secret_ref:
          type: string
          description: Workspace Secret vault id storing the provisioned app secret.
        bot_open_id:
          type: string
          description: Provisioned bot open_id when status=success.
        bot_name:
          type: string
          description: Provisioned bot display name when available.
        feishu_connector:
          $ref: '#/components/schemas/AgentFeishuConnectorChange'
    FeishuConnectorDiagnostics:
      type: object
      required:
        - agent_id
        - workspace_id
        - configured
        - enabled
        - event_mode
        - app_id_set
        - app_secret_set
        - verification_token_set
        - encrypt_key_set
        - bot_open_id_set
        - conversation_count
        - inbound_message_count
        - outbound_message_count
        - pending_outbound_count
        - retrying_outbound_count
        - dead_outbound_count
        - delivered_outbound_count
      properties:
        agent_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        configured:
          type: boolean
          description: True when any Feishu connector field is present.
        enabled:
          type: boolean
        event_mode:
          type: string
          enum: [webhook, websocket]
        app_id_set:
          type: boolean
          description: True when a Bot App ID is configured; the App ID itself is not returned.
        app_secret_set:
          type: boolean
          description: True when an App Secret reference is configured.
        verification_token_set:
          type: boolean
          description: True when a webhook verification token reference is configured.
        encrypt_key_set:
          type: boolean
          description: True when an optional encrypt-key reference is configured.
        bot_open_id_set:
          type: boolean
          description: True when Bot Open ID is configured for self-message dedup.
        conversation_count:
          type: integer
          minimum: 0
        inbound_message_count:
          type: integer
          minimum: 0
        outbound_message_count:
          type: integer
          minimum: 0
        pending_outbound_count:
          type: integer
          minimum: 0
        retrying_outbound_count:
          type: integer
          minimum: 0
        dead_outbound_count:
          type: integer
          minimum: 0
        delivered_outbound_count:
          type: integer
          minimum: 0
        last_inbound_at:
          type: string
          format: date-time
        last_outbound_at:
          type: string
          format: date-time
        last_delivered_at:
          type: string
          format: date-time
        last_error:
          type: string
          description: Last gateway retry/dead-letter error, truncated by the store layer.
        last_error_at:
          type: string
          format: date-time
    FeishuConnectorSnapshot:
      type: object
      required: [enabled, app_id, app_secret_ref, verification_token_ref, encrypt_key_ref, bot_open_id, event_mode, routing_mode]
      properties:
        enabled: { type: boolean }
        app_id: { type: string }
        app_secret_ref: { type: string }
        verification_token_ref: { type: string }
        encrypt_key_ref: { type: string }
        bot_open_id: { type: string }
        event_mode:
          type: string
          enum: ["", webhook, websocket]
          description: Empty only when the connector subtree was absent before the update.
        routing_mode:
          type: string
          enum: [direct, shared]
          description: Defaults to direct for existing connector snapshots.
    AgentFeishuConnectorChange:
      type: object
      required: [agent_id, workspace_id, name, slug, old, new, updated_at]
      properties:
        agent_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name: { type: string }
        slug: { type: string }
        old:
          $ref: '#/components/schemas/FeishuConnectorSnapshot'
        new:
          $ref: '#/components/schemas/FeishuConnectorSnapshot'
        updated_at:
          type: string
          format: date-time
        noop:
          type: boolean
          description: True when new deep-equals old; the audit log is suppressed.
    AgentSummary:
      type: object
      required: [id, workspace_id, name, slug, description, connector_type, visibility, status, capabilities, config, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        connector_type:
          type: string
        visibility:
          type: string
          enum: [workspace, tenant, public]
        status:
          type: string
        capabilities:
          type: array
          items:
            type: string
        config:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateAgentResponse:
      type: object
      required: [agent]
      properties:
        agent:
          $ref: '#/components/schemas/AgentSummary'
        initial_capabilities:
          type: array
          items:
            $ref: '#/components/schemas/AgentCapability'
    DeleteAgentResponse:
      type: object
      required: [agent]
      properties:
        agent:
          $ref: '#/components/schemas/AgentSummary'
    NameConflictError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          const: name_conflict
          deprecated: true
          description: |
            Deprecated 2026-06-07. Agent names are no longer unique within a
            workspace — the admin list disambiguates same-named Agents via the
            creator column. Schema kept temporarily so older API clients keep
            compiling; the server will not emit this code.
    SlugConflictError:
      type: object
      required: [error, suggested]
      properties:
        error:
          type: string
          const: slug_conflict
        suggested:
          type: string
    ImmutableSlugError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          const: slug is immutable
    ImmutableRuntimeError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          const: runtime is immutable post-create; recreate the agent to change runtime
    BadRequestError:
      type: object
      required: [error]
      properties:
        error:
          type: string
    InvalidRuntimeError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          const: invalid_runtime
    UnknownCapabilityError:
      type: object
      required: [error, invalid]
      properties:
        error:
          type: string
          const: unknown_capability
        invalid:
          type: array
          items:
            type: string
    InFlightRunsError:
      type: object
      required: [error, run_count]
      properties:
        error:
          type: string
          const: in_flight_runs
        run_count:
          type: integer
          format: int64
    Runtime:
      type: object
      description: |
        First-class runtime registered in a workspace. Product-facing runtime
        environments are Cloud Sandbox, Local Device, and External Agent.
        Daemon-backed rows currently use `type=agent_daemon`; local devices use
        `provider=agent_daemon`, while sandbox daemons use
        `provider=agent_daemon_sandbox` and sandbox metadata in `config`.
      required:
        - id
        - workspace_id
        - type
        - name
        - liveness
        - provider
        - hostname
        - version
        - config
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [agent_daemon, sandbox, external]
        name:
          type: string
        liveness:
          type: string
          enum: [pending_pairing, offline, online, error]
          description: |
            Heartbeat-derived runner state. `pending_pairing` until the
            daemon consumes the pair token; `offline`/`online` toggled by
            heartbeat sweeper; `error` reserved for fatal runner faults.
        provider:
          type: string
          enum: [agent_daemon, agent_daemon_sandbox, e2b_compatible, http_agent]
        owner_user_id:
          type: string
          format: uuid
          nullable: true
        hostname:
          type: string
        version:
          type: string
        last_heartbeat_at:
          type: string
          format: date-time
          nullable: true
        pairing_token_expires_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Non-null only when liveness=pending_pairing. Plaintext token
            is never returned past the original create response.
        config:
          type: object
          description: |
            Runtime config jsonb. For agent_daemon runtimes contains
            `runner_public_key` (base64 X25519) written by the pair
            handshake. Sandbox daemon runtimes use provider
            `agent_daemon_sandbox` and may include `created_by`,
            `agent_id`, and `sandbox_kind`. Daemon heartbeat
            persistence may include `supported_agent_kinds`,
            `supported_agent_kind_names`, `daemon_capabilities`,
            `agent_daemon_active_requests`, and `agent_daemon_heartbeat_ts`.
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
