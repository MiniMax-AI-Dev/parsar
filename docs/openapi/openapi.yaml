          schema:
            $ref: '#/definitions/bootstrap.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/bootstrap.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/bootstrap.ErrorResponse'
