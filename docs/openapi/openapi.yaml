  /api/v1/auth/feishu/callback:
    get:
      description: Verifies CSRF state, exchanges the code for a Feishu profile, upserts
        the user, creates a session cookie, and 302-redirects to the configured login-success
        URL.
      operationId: callbackDevFeishuOAuth
      parameters:
      - description: CSRF state minted at /start
        in: query
        name: state
        required: true
        type: string
      - description: OAuth authorization code returned by Feishu
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Redirect to login-success URL
        "400":
          description: Missing state/code or CSRF mismatch
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: User upsert or session creation failed
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Feishu OIDC exchange failed
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Feishu OIDC not configured
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Handle Feishu OIDC callback
      tags:
      - auth
  /api/v1/auth/feishu/start:
    get:
      description: Mints a CSRF state cookie and 302-redirects the browser to Feishu's
        authorize URL. Returns 503 when Feishu OIDC is not configured.
      operationId: startDevFeishuOAuth
      produces:
      - application/json
      responses:
        "302":
          description: Redirect to Feishu authorize URL
        "500":
          description: CSRF state minting failed
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Feishu OIDC not configured
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Start Feishu OIDC login
      tags:
      - auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      operationId: login-email-password
      parameters:
      - description: credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/password.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/password.loginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/password.errorResponse'
        "401":
          description: Unauthorized
