        required: true
        type: string
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream opened
        "400":
          description: conversation_id or run_id is not a valid uuid
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not a workspace member or is viewer-only
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Run not found or not part of conversation
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: ResponseWriter does not support flushing
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed conversation run streaming is disabled
          schema:
            additionalProperties:
              type: string
            type: object
