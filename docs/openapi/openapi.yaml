      operationId: deleteWorkspaceSpecFragment
      parameters:
      - description: workspace id
        in: path
        name: workspaceID
        required: true
        type: string
      - description: fragment id
        in: path
        name: fragmentID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a workspace spec fragment
      tags:
      - memories
    patch:
      consumes:
      - application/json
      description: Mutates a fragment's content. Cross-workspace access is masked
        as 404 so ids aren't enumerable.
      operationId: updateWorkspaceSpecFragment
      parameters:
      - description: workspace id
        in: path
        name: workspaceID
        required: true
        type: string
      - description: fragment id
        in: path
        name: fragmentID
        required: true
        type: string
      - description: new content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/specmem.updateFragmentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/specmem.fragmentDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a workspace spec fragment
      tags:
      - memories
  /api/v1/workspaces/{workspaceID}/spec/import:
    post:
      consumes:
      - application/json
      description: Slices a spec document into fragments. confirm=false previews;
        confirm=true persists every piece with SourceImport.
      operationId: importWorkspaceSpec
      parameters:
      - description: workspace id
        in: path
        name: workspaceID
        required: true
        type: string
      - description: spec text and confirm flag
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/specmem.importSpecRequest'
      produces:
      - application/json
      responses:
        "200":
          description: preview (confirm=false)
          schema:
            $ref: '#/definitions/specmem.importSpecResponse'
        "201":
          description: persisted (confirm=true)
          schema:
            $ref: '#/definitions/specmem.importSpecResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: partial import (rows persisted before failure)
          schema:
            additionalProperties: true
            type: object
      summary: Import a spec document
      tags:
      - memories
  /api/v1/workspaces/{workspaceID}/uploads/presign-download:
    post:
      consumes:
      - application/json
      description: Returns a presigned URL for downloading a previously-uploaded plugin/skill
        zip. Validates the ref belongs to the calling workspace (403 on mismatch)
        to close the cross-tenant read hole. Caller must be workspace capability admin.
      operationId: createDevWorkspaceDownloadPresign
      parameters:
      - description: Workspace UUID
        in: path
        name: workspaceID
        required: true
        type: string
      - description: Presign download payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.presignDownloadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Presigned download spec
          schema:
            $ref: '#/definitions/dev.presignDownloadResponse'
        "400":
          description: Body invalid or ossKey empty
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Ref does not belong to this workspace
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Blob backend error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Object storage not configured
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Presign a plugin/skill download
      tags:
      - uploads
  /api/v1/workspaces/{workspaceID}/uploads/presign-upload:
    post:
      consumes:
      - application/json
      description: Returns a presigned URL the browser PUTs the plugin/skill zip to.
        The blob backend (OSS or PG) mints a workspace-scoped ref that later downloads
        verify against. Caller must be workspace capability admin.
      operationId: createDevWorkspaceUploadPresign
      parameters:
      - description: Workspace UUID
        in: path
        name: workspaceID
        required: true
        type: string
      - description: Presign upload payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.presignUploadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Presigned upload spec
          schema:
            $ref: '#/definitions/dev.presignUploadResponse'
        "400":
          description: Body invalid, filename empty, or prefix not in {plugin,skill}
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller lacks capability admin permission
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Blob backend error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Object storage not configured
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Presign a plugin/skill upload
      tags:
      - uploads
  /dev/auth/verify:
    post:
      consumes:
      - application/json
      description: Development-only login. Verifies the fixed dev code and returns
        a bearer token plus the default seed workspace + user. Never enable in production.
      operationId: verifyDevAuth
      parameters:
      - description: '{email, code}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Bearer token + user + workspace
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid json
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid dev credentials
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Dev-only email + code login
      tags:
      - dev
  /dev/connectors/opencode/stream:
    post:
      consumes:
      - application/json
      description: Dev-only Server-Sent Events endpoint that forwards the OpenCode
        connector's StreamPrompt output. Does NOT manage agent_run state — callers
        drive lifecycle via the regular dev endpoints.
      operationId: streamDevConnectorPrompt
      parameters:
      - description: Prompt input (workspace_id, conversation_id, run_id, agent_config
          required)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/connector.PromptInput'
      produces:
      - application/x-json-stream
      responses:
        "200":
          description: SSE stream opened
        "400":
          description: Body decode or validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: ResponseWriter does not support flushing or connector failure
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Connector does not support streaming
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: OpenCode AgentConnector is not registered
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Stream a raw connector prompt (dev SSE)
      tags:
      - gateway
  /dev/gateway/inbound:
    post:
      consumes:
      - application/json
      description: Writes an inbound gateway envelope from the connector daemon into
        storage for dispatch. Development helper.
      operationId: createDevGatewayInbound
      parameters:
      - description: Gateway inbound payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.gatewayInboundRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created row
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid body
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create an inbound gateway envelope
      tags:
      - gateway
  /dev/gateway/outbound:
    get:
      description: Returns outbound gateway messages, optionally filtered by connector
        or delivery status.
      operationId: listDevGatewayOutbound
      produces:
      - application/json
      responses:
        "200":
          description: Outbound message rows
          schema:
            additionalProperties: true
            type: object
      summary: List outbound gateway messages
      tags:
      - gateway
  /dev/gateway/outbound/{messageID}/delivered:
    post:
      consumes:
      - application/json
      description: Marks a gateway outbound message row as delivered. Used by the
        connector daemon to close the loop.
      operationId: markDevGatewayOutboundDelivered
      parameters:
      - description: Message ID
        in: path
        name: messageID
        required: true
        type: string
      - description: Delivery payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.markGatewayOutboundDeliveredBody'
      produces:
      - application/json
      responses:
        "200":
          description: Updated row
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid body or ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Message not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Mark an outbound gateway message delivered
      tags:
      - gateway
  /dev/http-agent/runner/run-once:
    post:
      consumes:
      - application/json
      description: Executes a single HTTP-agent invocation synchronously and returns
        the result. Development helper.
      operationId: runDevHTTPAgentOnce
      parameters:
      - description: Run payload
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Run result
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid body
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Run an HTTP agent once
      tags:
      - dev
  /dev/http-agent/runs/{runID}/invoke:
    post:
      consumes:
      - application/json
      description: Executes the HTTP-agent invocation associated with the given run
        row. Development helper.
      operationId: invokeDevHTTPAgentRun
      parameters:
      - description: Run UUID
        in: path
        name: runID
        required: true
        type: string
      - description: Invocation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.httpAgentInvokeBody'
      produces:
      - application/json
      responses:
        "200":
          description: Run result
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid body or UUID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Run not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Invoke an HTTP agent run
      tags:
      - dev
  /internal/agent-daemon/stream-prompt:
    post:
      consumes:
      - application/json
      description: Forwarded StreamPrompt entry point on the owner pod. Token-gated
        by the cluster-shared PARSAR_MASTER_KEY bearer.
      operationId: streamPromptInternal
      parameters:
      - description: Bearer <cluster shared token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: generation + PromptInput
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/agentdaemon.remoteStreamPromptRequest'
      produces:
      - text/plain
      responses:
        "200":
          description: NDJSON stream of PromptEvent (application/x-ndjson)
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: stale owner
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Owner-pod stream-prompt (internal)
      tags:
      - internal
  /internal/agent-daemon/submit-permission:
    post:
      consumes:
      - application/json
      description: Forwarded SubmitPermission entry point on the owner pod. Token-gated
        by the cluster-shared bearer.
      operationId: submitPermissionInternal
      parameters:
      - description: Bearer <cluster shared token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: generation + PermissionDecision
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/agentdaemon.remoteSubmitPermissionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{\"ok\":true}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: stale owner
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Owner-pod submit-permission (internal)
      tags:
      - internal
  /internal/agent-daemon/submit-prompt-for-user-choice:
    post:
      consumes:
      - application/json
      description: Forwarded SubmitPromptForUserChoice entry point on the owner pod.
        Token-gated by the cluster-shared bearer.
      operationId: submitPromptForUserChoiceInternal
      parameters:
      - description: Bearer <cluster shared token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: generation + PromptForUserChoiceDecision
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/agentdaemon.remoteSubmitPromptForUserChoiceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{\"ok\":true}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: stale owner
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Owner-pod submit-prompt-for-user-choice (internal)
      tags:
      - internal
  /internal/im/history:
    get:
      description: Returns a bounded, live page of IM messages for the given conversation.
        Authenticated by the per-conversation bearer token issued to the sandbox subprocess;
        unsupported platforms yield an empty 200 page.
      operationId: getInternalIMHistory
      parameters:
      - description: conversation id
        in: query
        name: conversation_id
        required: true
        type: string
      - description: optional platform-native thread scope
        in: query
        name: thread_id
        type: string
      - description: max messages (adapter default when 0)
        in: query
        name: limit
        type: integer
      - description: opaque page cursor from a prior response
        in: query
        name: cursor
        type: string
      - description: bearer token override (falls back to Authorization header)
        in: query
        name: token
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: message page
          schema:
            additionalProperties: true
            type: object
        "400":
          description: missing conversation_id
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: invalid token
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: unknown conversation
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: fetch history failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch internal IM history
      tags:
      - internal
  /readyz:
    get:
      description: Readiness probe. Pings each wired dependency (currently the database).
        Returns 200 with status "ok" iff every check reports ok; otherwise 503 with
        status "degraded".
      operationId: getReadyz
      produces:
      - application/json
      responses:
        "200":
          description: All dependencies healthy
          schema:
            $ref: '#/definitions/api.ReadyResponse'
        "503":
          description: One or more dependencies unhealthy or not configured
          schema:
            $ref: '#/definitions/api.ReadyResponse'
      summary: Readiness probe
      tags:
      - health
schemes:
- http
- https
securityDefinitions:
  CookieAuth:
    in: cookie
    name: parsar_session
    type: apiKey
swagger: "2.0"
