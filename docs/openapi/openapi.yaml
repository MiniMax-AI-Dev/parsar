            type: string
            enum: [queued, running, completed, failed, cancelled, interrupted]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        '200':
          description: Workspace agent runs ordered by creation time
        '404':
