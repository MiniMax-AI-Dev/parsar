  /api/v1/workspaces/{workspaceID}/members:
    get:
      operationId: listDevWorkspaceMembers
      summary: List workspace members
      description: Dev-only read API. Returns workspace memberships joined with user email/name/status. Unknown / deleted workspaces return an empty list, not 404 (mirror of secrets behaviour).
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        '200':
          description: Workspace members joined with user info, oldest first
        '400':
          description: Malformed workspace UUID
        '503':
          description: Database-backed read APIs are disabled
    post:
      operationId: addDevWorkspaceMember
      summary: Add a workspace member (admin-side, Phase 2 dev path)
      description: |
        Phase 2 admin path — there is no real invite / email-verify flow yet
        (Phase 3+). The admin supplies email + display name + role; the
        backend upserts the user record by email and inserts the workspace
        membership. If the email matches an existing user, that user is
        reused (`user_created=false`). If the (workspace, user) membership
        already exists, it is returned idempotently; a soft-deleted
        membership is revived at the new role.
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                  description: Display name. Defaults to the local part of the email when omitted.
                role:
                  type: string
                  enum: [owner, admin, member, viewer]
      responses:
        '201':
          description: Membership row plus `user_created` flag
        '400':
          description: Malformed UUID / missing email / invalid role
        '500':
          description: Server-side failure (e.g. DB write error)
        '403':
          description: User lacks required role on this workspace
        '503':
          description: Database-backed read APIs are disabled
  /api/v1/workspaces/{workspaceID}/members/{userID}:
    patch:
      operationId: updateDevWorkspaceMemberRole
      summary: Update a workspace member's role
      description: Flip an existing member's role between owner / admin / member / viewer. Returns 404 if the membership is unknown or already soft-deleted.
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [owner, admin, member, viewer]
      responses:
        '200':
          description: Updated membership row
        '400':
          description: Malformed UUID / invalid role
        '404':
          description: Workspace membership not found
        '403':
          description: User lacks required role on this workspace
        '503':
          description: Database-backed read APIs are disabled
    delete:
      operationId: removeDevWorkspaceMember
      summary: Remove a workspace member (soft-delete)
      description: Soft-deletes the workspace membership. The user record itself is preserved so it can be re-added later. Returns the removed ws_member row.
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Removed membership row
        '400':
          description: Malformed UUID
        '404':
          description: Workspace membership not found
        '403':
          description: User lacks required role on this workspace
        '503':
          description: Database-backed read APIs are disabled
  /api/v1/workspaces/{workspaceID}/runtime/status:
    get:
      operationId: getDevWorkspaceRuntimeStatus
      summary: Runtime banner status (sandbox credential health + per-workspace sandbox-agent population)
      description: |
        Workspace-scoped read API backing the admin web RuntimePage's
        RuntimeStatusBanner. Tells the operator runtime state in one
        round-trip so the banner can colour itself without a chained
        chatter of calls.

        v5 reversal (Runners v4 wave 1, 2026-05-30 19:25): runtime mode
        is now per-Agent (`agents.config.runtime`), not per-workspace.
        This endpoint dropped the `mode` field; the banner now describes
        cloud-sandbox readiness + sandbox-agent population.

        - `has_credential` — whether the workspace has a registered
          sandbox provider credential (`workspaces.config.runtime_credential_secret_id`
          is set). Required for `oss` / `selfhost` profiles that rely on
          workspace-managed credentials; normally false for `managed`
          deployments because the platform provides the sandbox provider
          configuration.
        - `credential_masked` — safe redacted preview (e.g.
          "e2b_•••wxyz") for surface in the wizard / banner without
          exposing the secret. `null` when no credential set.
        - `available` — true when the active sandbox provider passes
          the 1s liveness probe. In `oss` / `selfhost`, the handler only
          probes after a workspace credential exists. In `managed`, the
          handler probes the platform-managed provider even when
          `has_credential=false`. The banner uses this to colour green/red.
        - `sandbox_agent_count` — number of agents in this workspace
          whose declared runtime is `'sandbox'`. UI uses this to render
          "本工作区有 N 个 Agent 在云端运行" + drive the empty-state
          matrix branch (spec v5 §4.3.3).
        - `profile` — the Parsar runtime deployment profile (`"oss"`
          for the open-source default, `"managed"` when the deployment
          provides cloud-sandbox credentials, `"selfhost"` for
          operator-managed on-prem). The server derives it from runtime
          wiring and can be explicitly overridden with
          `PARSAR_RUNTIME_PROFILE`.
        - `configured_by` — optional. `"ops"` when the server is started
          with the `PARSAR_OPENCODE_RUNNER` env var set (legacy
          operator bootstrap default — informational only in v5 since
          runtime mode is per-Agent). Will be removed in a follow-up
          when admin UI stops querying it.

        RBAC: requires active workspace membership (any of owner /
        admin / member / viewer). Same bar as the other workspace-
        scoped admin reads.

        This endpoint does NOT make outbound HTTP requests to E2B
        every poll — the sandbox prober is a cheap in-process
        check (provider is wired and not shutdown). A deeper
        diagnostic (template resolution, sandbox spawn dry run)
        would belong on a separate /runtime/diagnostic endpoint.
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Runtime status snapshot
          content:
            application/json:
              schema:
                type: object
                required:
                  - has_credential
                  - credential_masked
                  - available
                  - sandbox_agent_count
                  - profile
                properties:
                  has_credential:
                    type: boolean
                    description: True when workspaces.config references a workspace runtime credential Secret. False is expected for managed deployments.
                  credential_masked:
                    type:
                      - string
                      - 'null'
                    description: Safe credential preview, e.g. e2b_•••wxyz; null when no credential is configured.
                  available:
                    type: boolean
                    description: |
                      True when the active sandbox provider passes the
                      liveness probe. In oss/selfhost this requires a
                      workspace credential first; in managed deployments
                      the platform provider is probed without a workspace
                      credential.
                  sandbox_agent_count:
                    type: integer
                    format: int64
                    minimum: 0
                    description: |
                      Number of agents in this workspace with
                      `agents.config.runtime = 'sandbox'`. Powers the
                      empty-state matrix branch and the "N 个 Agent 在
                      云端运行" banner copy.
                  profile:
                    type: string
                    enum: [oss, managed, selfhost]
                    description: |
                      Parsar runtime deployment profile. managed means
                      cloud sandbox credentials are supplied by the
                      deployment, so workspaces do not enter E2B keys.
                  configured_by:
                    type: string
                    enum: [ops]
                    description: |
                      "ops" when the server has PARSAR_OPENCODE_RUNNER
                      set. Legacy field — in v5 the env no longer drives
                      runtime selection (mode is per-Agent), so this is
                      informational only.
        '400':
          description: Malformed workspace UUID
        '403':
          description: Caller is not an active workspace member
        '404':
          description: Caller is not a member of this workspace (RBAC layer)
        '503':
          description: Runtime status not wired (server started without WithRuntimeStatus)
  /api/v1/workspaces/{workspaceID}/runtime/try-connection:
    post:
      operationId: postDevWorkspaceRuntimeTryConnection
      summary: Spawn an ephemeral test sandbox and run the 3-check connectivity pipeline
      description: |
        v3 spec §4.3.5 — backs the admin RuntimePage 「🚀 试一次云端运行」
        toolbar button. Lifts an ephemeral test sandbox via the same
        BuildSandboxRunner factory the per-agent path uses (with
        `ephemeral=true` + a 2-minute TTL as a safety net even if
        reclaim fails), runs the 3-check pipeline sequentially, then
        reclaims the sandbox.

        The 3 checks (in order, fail-short-circuits subsequent ones):

        - `spawn_test_sandbox` — e2b sandbox `Create` + `opencode serve`
          spawn + post-spawn liveness check. Error categories:
          `credInvalid` (401/403), `quotaExceeded` (429/limit),
          `unreachable` (network), `unknown`.
        - `runtime_ready` — opencode HTTP `/doc` probe inside the
          sandbox. Error category: `runtimeDown`.
        - `prompt_roundtrip` — `CreateSession` + `SendMessage("echo ok")`
          with a 30s budget. Error categories: `promptTimeout` (deadline
          exceeded), `runtimeDown` (other failures).

        Request body is intentionally empty — v3 explicitly disallows
        accepting `region` / `template` parameters (which would re-open
        the v1 "user supplies infra" trap). The server uses already-
        configured credentials, the standard `parsar-opencode-base`
        template, the workspace's default enabled model, and a fixed
        `echo ok` prompt.

        RBAC: workspace owner / admin only (same destructive-write bar
        as sandbox kill / rebuild — spawn burns real E2B quota even
        though the user-visible behaviour is "free probe"). An audit
        record (`runtime.try_connection`, source=admin, actor=user) is
        emitted regardless of overall pass / fail / RBAC outcome.

        `overall` collapses the per-check pass flags:
        - `pass`    — all 3 checks passed
        - `partial` — some checks passed, then one failed
        - `fail`    — first check failed (nothing else ran), or empty
                      checks slice

        `sandbox_id` is the e2b sandbox id assigned when spawn
        succeeded (empty when spawn failed before id allocation).
        `reclaimed` reports whether the reclaim path tore the sandbox
        down cleanly; `false` means the operator should expect the
        2-minute ephemeral TTL to clean up rather than the reclaim
        path. The sandbox is fully reclaimed (or about to be) by the
        time the response returns.
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: |
                Empty body. The server intentionally rejects any
                `region` / `template` / `prompt` fields the caller
                might try to pass — the probe is server-managed end-
                to-end per v3 spec §4.3.5.
      responses:
        '200':
          description: |
            Probe completed (regardless of per-check pass / fail).
            Inspect `overall` and each `checks[].pass` to interpret.
          content:
            application/json:
              schema:
                type: object
                required:
                  - overall
                  - started_at
                  - duration_ms
                  - sandbox_id
                  - reclaimed
                  - checks
                properties:
                  overall:
                    type: string
                    enum: [pass, partial, fail]
                    description: |
                      Collapsed pipeline outcome. `pass` = all 3
                      checks succeeded; `partial` = some succeeded
                      then one failed; `fail` = first check failed
                      (subsequent skipped).
                  started_at:
                    type: string
                    format: date-time
                    description: RFC3339 timestamp the probe started (server clock).
                  duration_ms:
                    type: integer
                    description: Total wall-clock time of the probe in milliseconds.
                  sandbox_id:
                    type: string
                    description: |
                      e2b sandbox id assigned when spawn succeeded;
                      empty string when spawn failed before an id was
                      allocated. Echoed for audit cross-reference even
                      after reclaim.
                  reclaimed:
                    type: boolean
                    description: |
                      True when the reclaim path tore the sandbox down
                      cleanly. False either when reclaim failed (the
                      2-minute ephemeral TTL is the safety net) or when
                      spawn failed before there was anything to reclaim.
                  checks:
                    type: array
                    description: |
                      One entry per attempted check, in pipeline order.
                      A failed check stops the pipeline — the array may
                      contain 1 entry (spawn failed), 2 entries
                      (runtime_ready failed), or all 3.
                    items:
                      type: object
                      required: [name, pass, duration_ms]
                      properties:
                        name:
                          type: string
                          enum: [spawn_test_sandbox, runtime_ready, prompt_roundtrip]
                        pass:
                          type: boolean
                        duration_ms:
                          type: integer
                          description: Wall-clock time of this check in ms.
                        error:
                          type: string
                          enum: [credInvalid, quotaExceeded, unreachable, runtimeDown, promptTimeout, unknown]
                          description: |
                            User-facing error category enum. Absent
                            when pass=true. NEVER contains raw vendor
                            error text — server logs receive the
                            detailed error via the executor's logger.
        '400':
          description: Malformed workspace UUID
        '403':
          description: Caller is a member but not owner / admin
        '404':
          description: Caller is not a member of this workspace (RBAC layer)
        '503':
          description: |
            Try-connection executor not wired. Happens when the server
            is not configured for this workspace. The web button
            is hidden in that mode; the 503 protects against direct
            callers.
  /api/v1/workspaces/{workspaceID}/runtime/credential:
    put:
      operationId: putDevWorkspaceRuntimeCredential
      summary: Register or overwrite the workspace's sandbox runtime credential
      description: |
        Stores an E2B (or other sandbox provider) API key in the
        workspace secret vault and points
        `workspaces.config.runtime_credential_secret_id` at the new
        secret. Powers the admin RuntimePage 「工作区凭证」 Card录入
        / 重置 flow.

        The handler:
        1. Validates `api_key` is non-empty.
        2. Uses server-side `PARSAR_MASTER_KEY` to encrypt the credential.
           Server has no `PARSAR_MASTER_KEY` configured → 503 (refuse to write a
           credential nothing could later decrypt).
        3. Encrypts `{api_key: <value>}` via secrets.Encrypt.
        4. Calls `RegisterWorkspaceRuntimeCredential` (single store
           transaction): soft-deletes any prior active runtime
           credential row for this workspace (matched by
           workspace_id + name + kind), inserts the new encrypted
           row, then flips `workspaces.config.runtime_credential_secret_id`
           at the new secret. Atomic upsert that handles the
           `uk_secrets_workspace_name_active` unique index across
           repeat PUTs.

        Idempotent upsert: a workspace that already has a credential
        gets its prior row soft-deleted (`deleted_at` populated, row
        body kept as audit trail) and pointer flipped to the new
        secret. v0.1 does not GC soft-deleted rows.

        RBAC: workspace owner / admin only.
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key:
                  type: string
                  minLength: 1
                  description: The sandbox provider API key to encrypt and store.
      responses:
        '200':
          description: Credential registered (or overwritten)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeCredentialResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Encrypt or store failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    delete:
      operationId: deleteDevWorkspaceRuntimeCredential
      summary: Clear the workspace's sandbox runtime credential pointer
      description: |
        Idempotent — clearing an already-empty pointer is a successful
        no-op. The handler runs a single transaction that (a) soft-
        deletes the prior active runtime credential row (sets
        `deleted_at`; row body kept as audit trail) and (b) clears
        `workspaces.config.runtime_credential_secret_id`. The soft-
        delete step is critical: a pointer-only clear would leave an
        orphan active row holding the `(workspace_id, name)` unique
        index slot, causing the next PUT to fail with a duplicate-key
        error. After delete, sandbox-type Agents in this workspace
        will be blocked at first prompt until a new credential is
        registered via PUT.

        No secret material is required for DELETE — clearing the pointer
        does not need to decrypt anything.

        RBAC: workspace owner / admin only.
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
      responses:
        '200':
          description: Pointer cleared (or already empty)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeCredentialResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/workspaces/{workspaceID}/sandboxes:
    get:
      operationId: listDevWorkspaceSandboxes
      summary: List active persistent sandboxes in a workspace
      description: |
        Dev-only admin API. Returns every persistent sandbox whose
        `killed_at` is NULL in the given workspace. `agent_id`
        is nullable: NULL means the sandbox is currently unbound.
        Response shape matches the per-agent
        `GET /api/v1/workspaces/{workspaceID}/agents/{agentID}/sandbox`
        endpoint, wrapped in `{"sandboxes": [...]}`. Empty workspace
        returns `{"sandboxes": []}`, not 404.
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        '200':
          description: Active sandboxes in the workspace, newest first
          content:
            application/json:
              schema:
                type: object
                required: [sandboxes]
                properties:
                  sandboxes:
                    type: array
                    items:
                      $ref: '#/components/schemas/SandboxStatus'
        '400':
          description: Malformed workspace UUID
        '500':
          description: Internal error reading sandboxes
        '503':
          description: Sandbox store not configured (sandbox runner mode disabled)
  /api/v1/workspaces/{workspaceID}/agents/{agentID}/sandbox:
    get:
      operationId: getDevAgentSandbox
      summary: Get the active persistent sandbox binding for one agent
      description: |
        Dev-only admin API (Phase 4 sandbox runtime). Returns the current
        live sandbox binding for a `(workspace, agent)` pair, or
        `null` when no binding exists. The binding includes `sandbox_id`,
        `status`, `started_at`, `last_active_at`, optional `metadata`,
        and the originating `agent_run_id` if known.
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
        - $ref: '#/components/parameters/AgentID'
      responses:
        '200':
          description: Live sandbox binding (or `null` when none active)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SandboxStatus'
        '400':
          description: Malformed workspace/agent UUID
        '503':
          description: Sandbox store not configured
  /api/v1/workspaces/{workspaceID}/agents/{agentID}/sandbox/kill:
    post:
      operationId: killDevAgentSandbox
      summary: Force-kill the active persistent sandbox for an agent
      description: |
        Dev-only admin API. Terminates the running sandbox (via the
        configured SandboxRunner provider) and marks `killed_at` on the
        binding row. Idempotent — kicking an already-killed binding
        returns 200 with the existing terminal state. Next prompt to the
        agent re-spawns a fresh sandbox per the Persistent
        Sandbox Provider singleflight contract (spec § 3.1).
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
        - $ref: '#/components/parameters/AgentID'
      responses:
        '200':
          description: Sandbox killed (or already terminal) — returns final binding state
        '400':
          description: Malformed workspace/agent UUID
        '404':
          description: No active sandbox binding for this agent
        '500':
          description: Sandbox kill failed at the runner / store layer
        '503':
          description: Sandbox binding store / runner not configured
  /api/v1/workspaces/{workspaceID}/agents/{agentID}/sandbox/rebuild:
    post:
      operationId: rebuildDevAgentSandbox
      summary: Kill the active persistent sandbox and pre-warm a fresh one
      description: |
        Dev-only admin API. Two-step lifecycle: (1) kill the current
        sandbox (cache + DB row), then (2) immediately ask the
        Connector's WarmSandbox path to spawn a fresh sandbox so
        the next user prompt avoids the ~10s E2B cold-start cost.

        Behaviour matrix:
        - Sandbox runner mode + warmer wired → response includes
          `action: "rebuilt"`, `warm: "ok"`, `warm_cache_key`.
        - Sandbox runner mode + warm spawn failed → response is
          200 with `action: "killed"`, `warm: "failed"`,
          `warm_error: "<detail>"` (kill succeeded, next prompt
          cold-starts).
        - Local runner mode or warmer not wired → response is
          200 with `action: "killed"`, `warm: "unavailable"`.

        Idempotent against unknown bindings — first call hits the
        normal kill path; subsequent calls return 404 because no
        live binding remains.
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
        - $ref: '#/components/parameters/AgentID'
      responses:
        '200':
          description: |
            Kill succeeded; response body distinguishes the warm
            outcome via the `warm` field
            (`ok` | `failed` | `unavailable`).
        '400':
          description: Malformed workspace/agent UUID
        '404':
          description: No active sandbox binding for this agent
        '500':
          description: Sandbox kill failed at the runner / store layer
        '503':
          description: Sandbox binding store / runner not configured
  /api/v1/workspaces/{workspaceID}/sandbox-pool:
    get:
      operationId: listDevSandboxPool
      summary: Sandbox pool stats + paginated active entries
      description: |
        Dev-only admin API (Phase 3 workspace-scoped sandbox pool, dev-context §3.7).
        Returns the in-memory pool snapshot (per-status counts) plus a
        paginated listing of workspace-scoped `sandboxes` rows in the sandbox-pool view (`allocation_status` pooled/bound) whose `killed_at` is
        NULL. Empty
        pool returns `{"entries": [], "total": 0}`, not 404.
        Persistence-layer read failure degrades to empty `entries` +
        `total: 0` rather than 5xx — the in-memory stats are still
        the authoritative health signal.
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Pool snapshot + paginated entries
        '503':
          description: |
            Sandbox pool not configured (sandbox runner mode disabled).
            Body carries `configured: false` for the admin UI.
  /api/v1/workspaces/{workspaceID}/sandbox-pool/spawn:
    post:
      operationId: spawnDevSandboxPool
      summary: Batch-spawn N blank sandboxes into one workspace pool
      description: |
        Admin batch-creation. Calls the pool's Factory N times in serial
        with the per-batch `timeout_seconds`. Partial success is
        encoded in the response body — one Factory failure does NOT
        abort the batch; surviving slots still land. Always returns
        200 when the call was processed; the caller inspects the
        `created` and `errors` arrays. Bad input (count<=0,
        timeout_seconds<=0, malformed JSON) returns 400.
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: |
            Batch processed.
            Body has `{created: [ids], errors: [strings]}`.
        '400':
          description: Malformed body / count<=0 / timeout_seconds<=0
        '503':
          description: Sandbox pool not configured
  /api/v1/workspaces/{workspaceID}/sandbox-pool/{sandboxID}/renew:
    post:
      operationId: renewDevSandboxPoolEntry
      summary: Admin-issued manual renew on one pool entry
      description: |
        Calls the pool's Renewer for one entry, rolling `expires_at`
        forward by the entry's per-batch `timeout_seconds`. Refuses
        renewal on claimed entries (the downstream runner owns
        lifecycle from claim) and on entries already mid-renew
        (admin retry will work once the in-flight op finishes).
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sandboxID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Renew succeeded; entry's `last_renewed_at` + `expires_at` advanced
        '404':
          description: No such entry
        '409':
          description: Entry is claimed / already mid-renew (retry once in-flight op finishes)
        '502':
          description: Renewer call failed at the e2b / upstream layer
        '503':
          description: Sandbox pool not configured / renewer not configured
  /api/v1/workspaces/{workspaceID}/sandbox-pool/{sandboxID}/kill:
    post:
      operationId: killDevSandboxPoolEntry
      summary: Admin-issued terminal kill on one pool entry
      description: |
        Calls the entry's kill callback (e2b Kill) and removes it from
        the in-memory pool. Persists `lifecycle_status='killed' / allocation_status='released' / killed_at=now`.
        Idempotent against a concurrent kill: a kill on an
        already-removed id returns 404, NOT 409.
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sandboxID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Kill succeeded
        '404':
          description: No such entry (already killed or never existed)
        '503':
          description: Sandbox pool not configured
  /api/v1/workspaces/{workspaceID}/sandbox-pool/{sandboxID}/auto-renew:
    patch:
      operationId: patchDevSandboxPoolAutoRenew
      summary: Update one entry's auto-renew threshold
      description: |
        Sets the per-entry auto-renew trigger. `threshold_seconds=0`
        turns auto-renew off; `>0` means "renew when remaining
        lifetime drops to <= this value". The auto-renew goroutine
        wakes every minute (server default) and runs Renewer on any
        entry whose remaining time has crossed the threshold.
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sandboxID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Threshold updated; body echoes `sandbox_id` + `auto_renew_threshold_seconds`
        '400':
          description: Malformed body / negative `threshold_seconds`
        '404':
          description: No such entry
        '503':
          description: Sandbox pool not configured

# ===================================================================
# Runtime lifecycle / Agent Daemon pairing
# ===================================================================
# Two surfaces share the runtimes table:
#   Admin (workspace owner/admin via user-session cookie)
#     /api/v1/workspaces/{wid}/runtimes[...]
#   Runtime credential (paired daemon via Bearer credential)
#     /api/v1/runtimes/pair
#     /api/v1/runtimes/{id}/heartbeat
  /api/v1/workspaces/{workspaceID}/runtimes:
    get:
      operationId: listWorkspaceRuntimes
      summary: List runtimes registered in a workspace
      description: |
        Returns workspace runtime rows newest first. Product-facing runtime
        environments are Cloud Sandbox, Local Device, and External Agent;
        daemon-backed local devices and sandbox daemons both use
        `type=agent_daemon` and are split by provider/config. Default lists
        all types; filter with `?type=agent_daemon` to populate local-device
        and sandbox-daemon views. Device pickers can add `placement`,
        `liveness`, and `agent_kind` to ask the backend for selectable
        daemon rows instead of reinterpreting raw runtime config.
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [agent_daemon, sandbox, external]
        - name: placement
          in: query
          required: false
          description: Derived product runtime environment filter.
          schema:
            type: string
            enum: [local_device, cloud_sandbox, external_agent]
        - name: liveness
          in: query
          required: false
          description: Heartbeat-derived runtime liveness filter.
          schema:
            type: string
            enum: [pending_pairing, offline, online, error]
        - name: agent_kind
          in: query
          required: false
          description: Filter daemon runtimes to those advertising this available agent kind. Legacy daemon rows with no capability snapshot match `claude_code` only.
          schema:
            type: string
            example: claude_code
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        '200':
          description: Active runtimes
          content:
            application/json:
              schema:
                type: object
                required: [runtimes]
                properties:
                  runtimes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Runtime'
        '403':
          description: Caller is not a workspace member
    post:
      operationId: createRuntimePairing
      summary: Mint a runtime pairing token (admin only)
      description: |
        Creates a runtime row in `liveness=pending_pairing` and returns
        a one-shot plaintext pairing
        token. The operator pastes that token into `parsar-daemon connect`;
        on first `POST /api/v1/runtimes/pair` the row transitions to
        `liveness=offline` and the token is consumed. The plaintext
        token is NEVER returned again — admin must keep it or regenerate.
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                type:
                  type: string
                  enum: [agent_daemon]
                  default: agent_daemon
                  description: |
                    Manual pairing creates Agent Daemon devices. sandbox /
                    external rows are managed elsewhere.
                name:
                  type: string
                  description: Unique-per-workspace human label (e.g. alice-laptop).
                provider:
                  type: string
                  enum: [agent_daemon]
                  default: agent_daemon
                token_ttl_seconds:
                  type: integer
                  default: 900
                  description: Pairing window. Defaults to 15 minutes.
      responses:
        '201':
          description: Pairing token minted
          content:
            application/json:
              schema:
                type: object
                required: [runtime, pairing_token]
                properties:
                  runtime:
                    $ref: '#/components/schemas/Runtime'
                  pairing_token:
                    type: string
                    description: |
                      Plaintext one-shot token (prefix `rtk_`). Show
                      once + copy/paste into parsar-daemon. Server only
                      retains the sha256 hash.
        '400':
          description: Invalid payload
        '403':
          description: Caller is not workspace owner/admin
  /api/v1/workspaces/{workspaceID}/runtimes/{runtimeID}:
    get:
      operationId: getWorkspaceRuntime
      summary: Runtime detail
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
        - $ref: '#/components/parameters/RuntimeID'
      responses:
        '200':
          description: Runtime
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Runtime'
        '404':
          description: Runtime not found or deleted
    patch:
      operationId: patchWorkspaceRuntime
      summary: Rename runtime
      description: |
        Empty/omitted fields are left unchanged. Soft-delete is exposed
        through the DELETE endpoint so historical run rows can keep their
        runtime reference.
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
        - $ref: '#/components/parameters/RuntimeID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Updated runtime
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Runtime'
        '404':
          description: Runtime not found
    delete:
      operationId: deleteWorkspaceRuntime
      summary: Soft-delete the runtime
      description: |
        Marks the runtime `deleted_at`. Historical `agent_runs.runtime_id`
        rows remain so Run Detail can still display "ran on
        alice-laptop (deleted)".
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
        - $ref: '#/components/parameters/RuntimeID'
      responses:
        '204':
          description: Deleted
  # -------------------------------------------------------------------
  # Runtime credential surface — Bearer auth (Authorization: Bearer <runner_credential>)
  # -------------------------------------------------------------------
  /api/v1/runtimes/pair:
    post:
      operationId: pairRuntime
      summary: Runtime pair handshake
      description: |
        Public bootstrap — uses pairing token (NOT runner credential)
        because the daemon has no credential yet. Server validates the
        token hash, promotes the runtime to `offline`, stores the
        daemon's X25519 public key under config.runner_public_key, and
        returns runtime_id + runner_credential (HMAC bearer) used by
        every subsequent request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pairing_token, hostname, version, runner_public_key]
              properties:
                pairing_token:
                  type: string
                  description: Plaintext token from `POST .../runtimes`.
                hostname:
                  type: string
                version:
                  type: string
                  description: Daemon CLI semver (e.g. 0.1.0).
                runner_public_key:
                  type: string
                  description: |
                    base64(stdEncoding) of a 32-byte X25519 public key.
                    Server seals per-run payloads to this key.
      responses:
        '200':
          description: Pair OK; daemon stores returned credential
          content:
            application/json:
              schema:
                type: object
                required: [runtime, runner_credential]
                properties:
                  runtime:
                    $ref: '#/components/schemas/Runtime'
                  runner_credential:
                    type: string
                    description: |
                      Long-lived HMAC bearer the daemon sends as
                      `Authorization: Bearer <credential>` on all
                      subsequent calls.
        '401':
          description: Pairing token invalid, expired, or already consumed
  /api/v1/runtimes/{runtimeID}/heartbeat:
    post:
      operationId: runtimeHeartbeat
      summary: Runtime heartbeat
      description: |
        Bumps last_heartbeat_at; promotes liveness=offline -> online.
        Returns the runtime's current heartbeat-derived `liveness`.
      parameters:
        - $ref: '#/components/parameters/RuntimeID'
      responses:
        '200':
          description: Heartbeat applied
          content:
            application/json:
              schema:
                type: object
                required: [liveness]
                properties:
                  liveness:
                    type: string
                    enum: [online, offline, error]
        '401':
          description: Bearer credential missing or invalid
components:


