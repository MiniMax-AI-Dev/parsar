        '202':
          description: Run accepted and transitioned to running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStarted'
        '400':
          description: Malformed conversation or run UUID
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
