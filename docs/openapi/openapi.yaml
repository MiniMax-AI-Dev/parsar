  /api/v1/me:
    get:
      operationId: getDevMe
      summary: Get the current dev caller identity
      description: |
        Phase 3 auth read API. The normal path requires a valid
        `parsar_session` HttpOnly cookie. The legacy
        `X-Parsar-Dev-User-ID` shim is accepted only when the server was
        explicitly started with `PARSAR_DEV_AUTH=true`.
      responses:
