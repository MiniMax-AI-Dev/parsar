openapi: 3.1.0
info:
  title: Parsar API
  version: 0.0.0
  description: |
    Parsar harness and Phase 1 fake-system API contract.

    Feishu production auth/event deployments require
    `PARSAR_FEISHU_APP_ID`, `PARSAR_FEISHU_APP_SECRET`,
    `PARSAR_FEISHU_REDIRECT_URI`, and
    `PARSAR_FEISHU_VERIFICATION_TOKEN` when
    `PARSAR_FEISHU_MOCK` is not true. `PARSAR_FEISHU_ENCRYPT_KEY`
    is optional unless Feishu event encryption is enabled.
paths:
  /api/v1/capabilities/marketplace:
    get:
      operationId: listDevMarketplaceCapabilities
      summary: List public marketplace capabilities visible to a workspace
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Marketplace capability list
          content:
            application/json:
              schema:
                type: object
                required: [workspace_id, capabilities]
                properties:
                  workspace_id:
                    type: string
                    format: uuid
                  capabilities:
                    type: array
                    items:
                      $ref: '#/components/schemas/MarketplaceCapability'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - name
                properties:
                  status:
                    type: string
                    const: ok
                  name:
                    type: string
                    const: parsar

  /api/v1/bootstrap/status:
    get:
      operationId: getBootstrapStatus
      summary: First-owner bootstrap posture (public)
      description: |
        Returns whether the install still needs first-owner provisioning.
        Unauthenticated by design: an installer / first-run UI needs to
        learn the posture before any user exists. The response carries
        only boolean state plus an owner count — never user or workspace
        identity, so it leaks nothing material pre-setup.

        `needed=true` means no active workspace owner exists yet — the
        operator should run `POST /api/v1/bootstrap` (HTTP path, with the
        configured `PARSAR_BOOTSTRAP_TOKEN`) or the
        `cmd/parsar-bootstrap` CLI to provision the first owner.

        `http_enabled=false` means `PARSAR_BOOTSTRAP_TOKEN` is unset,
        so `POST /api/v1/bootstrap` returns 503 — operators must fall
        back to the CLI carrier.
      responses:
        '200':
          description: Current bootstrap posture
          content:
            application/json:
              schema:
                type: object
                required:
                  - needed
                  - has_owners
                  - owner_count
                  - http_enabled
                  - dev_auth_enabled
                properties:
                  needed:
                    type: boolean
                  has_owners:
                    type: boolean
                  owner_count:
                    type: integer
                    format: int64
                  http_enabled:
                    type: boolean
                  dev_auth_enabled:
                    type: boolean
        '503':
          description: Bootstrap service not wired (no database)
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1v1~1bootstrap/post/responses/401/content/application~1json/schema'

  /api/v1/bootstrap:
    post:
      operationId: createBootstrapFirstOwner
      summary: Provision the first workspace owner (token-gated, single use)
      description: |
        Atomically creates the first user + workspace + owner membership
        on a freshly-installed Parsar. Single-use: once any active
        workspace owner exists, every subsequent call returns 409
        (`bootstrap_closed`) — the door cannot be reopened from the API.

        Authorization: `Authorization: Bearer <token>` where `<token>`
        matches `PARSAR_BOOTSTRAP_TOKEN` (config key
        `auth.bootstrap.token`). Compared in constant time. Empty token
        configuration disables the HTTP endpoint entirely (503
        `bootstrap_http_disabled`) — operators use the
        `cmd/parsar-bootstrap` CLI in that case.

        Operators MUST remove `PARSAR_BOOTSTRAP_TOKEN` from the
        process environment after a successful first call. Leaving the
        token in env is a long-lived credential exposure even though
        the gate is now closed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - workspace_name
              properties:
                email:
                  type: string
                  format: email
                  description: Owner email address; must contain '@'.
                name:
                  type: string
                  description: |
                    Owner display name. Defaults to the local-part of
                    the email when empty.
                workspace_name:
                  type: string
                  description: Workspace human name (slug is auto-generated).
      responses:
        '201':
          description: First owner + workspace created; setup is now complete
          content:
            application/json:
              schema:
                type: object
                required:
                  - user_id
                  - user_created
                  - workspace_id
                  - workspace_slug
                  - workspace_name
                  - member_id
                  - setup_complete
                properties:
                  user_id:
                    type: string
                    format: uuid
                  user_created:
                    type: boolean
                  workspace_id:
                    type: string
                    format: uuid
                  workspace_slug:
                    type: string
                  workspace_name:
                    type: string
                  member_id:
                    type: string
                    format: uuid
                  setup_complete:
                    type: boolean
                    const: true
        '400':
          description: Invalid input (missing/empty/malformed field)
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1v1~1bootstrap/post/responses/401/content/application~1json/schema'
        '401':
          description: Missing / malformed / wrong Authorization Bearer token
          content:
            application/json:
              schema:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                    enum:
                      - bootstrap_unauthorized
                      - bootstrap_invalid_input
                      - bootstrap_closed
                      - bootstrap_http_disabled
                      - bootstrap_internal_error
                      - bootstrap_status_failed
                      - bootstrap_unavailable
                  message:
                    type: string
        '409':
          description: Bootstrap already complete (an active workspace owner exists)
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1v1~1bootstrap/post/responses/401/content/application~1json/schema'
        '500':
          description: Internal error (database failure, etc.)
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1v1~1bootstrap/post/responses/401/content/application~1json/schema'
        '503':
          description: |
            HTTP endpoint disabled (PARSAR_BOOTSTRAP_TOKEN unset) or
            bootstrap service not wired.
          content:
            application/json:
              schema:
                $ref: '#/paths/~1api~1v1~1bootstrap/post/responses/401/content/application~1json/schema'

  /api/v1/workspaces/{workspaceID}/settings:
    get:
      operationId: getDevWorkspaceSettings
      summary: Read workspace admin settings
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
      responses:
        '200':
          description: Workspace settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSettingsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchDevWorkspaceSettings
      summary: Touch workspace admin settings
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceSettingsRequest'
      responses:
        '200':
          description: Updated workspace settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSettingsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/workspaces/{workspaceID}/agents:
    get:
      operationId: listDevAgents
      summary: List active agents in a workspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
      responses:
        '200':
          description: Active workspace agents with profile basics
          content:
            application/json:
              schema:
                type: object
                required: [agents]
                properties:
                  agents:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentSummary'
        '404':
          description: Unknown active workspace
        '503':
          description: Database-backed read APIs are disabled
    post:
      operationId: createDevAgent
      summary: Create an agent in a workspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
      responses:
        '201':
          description: Created agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAgentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Slug conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlugConflictError'
        '422':
          description: Unknown capability or invalid runtime
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UnknownCapabilityError'
                  - $ref: '#/components/schemas/InvalidRuntimeError'
  /api/v1/agents/{agentID}:
    patch:
      operationId: updateDevAgent
      summary: Update mutable agent fields
      parameters:
        - $ref: '#/components/parameters/AgentID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentRequest'
      responses:
        '200':
          description: Updated agent
          content:
            application/json:
              schema:
                type: object
                required: [agent]
                properties:
                  agent:
                    $ref: '#/components/schemas/AgentSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Immutable field (slug or runtime), or unknown capability
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ImmutableSlugError'
                  - $ref: '#/components/schemas/UnknownCapabilityError'
                  - $ref: '#/components/schemas/ImmutableRuntimeError'
    delete:
      operationId: deleteDevAgent
      summary: Soft-delete an agent
      parameters:
        - $ref: '#/components/parameters/AgentID'
      responses:
        '200':
          description: Deleted agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAgentResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/InFlightRuns'
  /api/v1/agents/{agentID}/visibility:
    patch:
      operationId: updateDevAgentVisibility
      summary: Update an agent's visibility
      parameters:
        - $ref: '#/components/parameters/AgentID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visibility]
              properties:
                visibility:
                  type: string
                  enum: [workspace, tenant, public]
                  description: Who can invoke this Agent.
      responses:
        '200':
          description: Updated agent
          content:
            application/json:
              schema:
                type: object
                required: [agent]
                properties:
                  agent:
                    $ref: '#/components/schemas/AgentSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/agents/{agentID}/connector/feishu/diagnostics:
    get:
      operationId: getDevAgentFeishuConnectorDiagnostics
      summary: Inspect Feishu Bot connector delivery diagnostics for an Agent
      description: |
        Returns a read-only, secret-safe observation snapshot for one Agent's
        Feishu Bot binding. The response aggregates recent Feishu inbound and
        outbound message metadata by the Agent connector's Bot app binding, so
        operators can tell whether the chain is stuck before inbound, queued
        for outbound, retrying, dead-lettered, or already delivered.

        RBAC: any active member of the Agent's workspace may read diagnostics.
        Secret refs, app secret payloads, and message bodies are never returned.
      parameters:
        - $ref: '#/components/parameters/AgentID'
      responses:
        '200':
          description: Feishu connector diagnostics snapshot
          content:
            application/json:
              schema:
                type: object
                required: [diagnostics]
                properties:
                  diagnostics:
                    $ref: '#/components/schemas/FeishuConnectorDiagnostics'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/agents/{agentID}/connector/feishu:
    patch:
      operationId: updateDevAgentFeishuConnector
      summary: Bind (or rebind) an Agent to a Feishu Bot self-built app
      description: |
        Writes `agents.config.connectors.feishu`. Read path (inbound
        router `GetAgentByFeishuAppID` + inflight-driver credential
        resolution) is already wired to this same subtree — this is
        the corresponding write entry.

        RBAC: workspace owner / admin (same bar as visibility — a
        misconfigured Bot can leak the workspace to the internet).

        Validation:
          - When `enabled=true`: `app_id` and `app_secret_ref` are required.
            `verification_token_ref` is also required in `event_mode=webhook`;
            `event_mode=websocket` is used by QR provisioning and only needs
            `app_secret_ref`. Missing required fields returns 422
            `feishu_connector_incomplete`.
          - `app_id` uniqueness: a non-empty `app_id` cannot collide
            with another active+enabled Feishu Bot on a different
            Agent. Returns 409 `feishu_app_id_in_use`.
          - `routing_mode=direct` preserves one Bot -> one Agent routing.
            `routing_mode=shared` makes this Agent the shared Bot host;
            users pick the execution Agent with `/list` and `/select`, and
            Parsar still re-runs target Agent visibility before dispatch.

        Spec: docs/feishu-routing.md §6.2 + §9 step 4.
      parameters:
        - $ref: '#/components/parameters/AgentID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentFeishuConnectorRequest'
      responses:
        '200':
          description: Updated Feishu connector binding, with before/after snapshots
          content:
            application/json:
              schema:
                type: object
                required: [feishu_connector]
                properties:
                  feishu_connector:
                    $ref: '#/components/schemas/AgentFeishuConnectorChange'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: app_id already registered by another active+enabled Agent
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    enum: [feishu_app_id_in_use]
                  detail:
                    type: string
                    description: Human-readable verbose message for logs / devtools.
        '422':
          description: enabled=true but required fields are missing
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    enum: [feishu_connector_incomplete]
                  detail:
                    type: string
                    description: Human-readable verbose message for logs / devtools.
  /api/v1/agents/{agentID}/connector/feishu/provision/begin:
    post:
      operationId: beginDevAgentFeishuProvisioning
      summary: Begin Feishu Bot QR provisioning for an Agent
      description: |
        Starts the Feishu app-registration device flow for creating a
        per-Agent Bot self-built app. The caller must be workspace owner / admin
        for the Agent's workspace. The response carries the verification URL
        and user code that the admin scans/opens in Feishu.

        The successful poll path stores the app secret in the workspace Secret
        vault and writes `agents.config.connectors.feishu.event_mode=websocket`.
      parameters:
        - $ref: '#/components/parameters/AgentID'
      responses:
        '200':
          description: Device-flow registration started; poll until success or error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeishuProvisioningResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '502':
          description: Feishu app-registration begin failed upstream.
        '503':
          description: Feishu app-registration provisioning is not configured.
  /api/v1/agents/{agentID}/connector/feishu/provision/poll:
    post:
      operationId: pollDevAgentFeishuProvisioning
      summary: Poll Feishu Bot QR provisioning for an Agent
      description: |
        Polls the Feishu app-registration device flow. `pending` responses
        include the next polling interval. On `success`, Parsar validates the
        provisioned Bot, stores the app secret in the workspace Secret vault,
        and binds the Agent's Feishu connector in websocket event mode. On
        `error`, the caller should stop polling and show the returned message.
      parameters:
        - $ref: '#/components/parameters/AgentID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeishuProvisionPollRequest'
      responses:
        '200':
          description: Current provisioning status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeishuProvisioningResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Provisioned app_id is already bound to another active Agent.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    enum: [feishu_app_id_in_use]
                  detail:
                    type: string
        '422':
          description: Connector binding validation failed after provisioning.
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
                    enum: [feishu_connector_incomplete]
                  detail:
                    type: string
        '500':
          description: Failed to store the provisioned app secret.
        '502':
          description: Feishu polling, credential, or Bot validation failed upstream.
        '503':
          description: Feishu app-registration provisioning is not configured.
  /dev/seed:
    get:
      operationId: getDevSeed
      summary: Development seed fixture
      description: |
        Returns the deterministic development seed. The response carries two
        kinds of fields:

        - Legacy human-readable fixture (`workspace`, `users`, `agents`,
          `conversations`) for back-compat with older dev consumers.
        - A `db` envelope with the real DB UUIDs that `cmd/seeddev` writes,
          so the admin UI can auto-bind to the seeded workspace /
          conversation without copy-pasting UUIDs from psql.
      responses:
        '200':
          description: Deterministic development seed
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    type: object
                    description: Legacy human-readable workspace fixture.
                  users:
                    type: array
                    items:
                      type: object
                  agents:
                    type: array
                    items:
                      type: object
                  conversations:
                    type: array
                    items:
                      type: object
                  db:
                    type: object
                    description: |
                      Deterministic DB UUIDs from
                      `server/internal/store.DefaultDevFixtureIDs`. These
                      match exactly what `make seed-dev-db` inserts and
                      drive the admin UI's workspace auto-binding.
                    properties:
                      workspace_id:
                        type: string
                        format: uuid
                      user_id:
                        type: string
                        format: uuid
                      conversation_id:
                        type: string
                        format: uuid
                      agents:
                        type: object
                        properties:
                          product_agent_id:
                            type: string
                            format: uuid
                          backend_agent_id:
                            type: string
                            format: uuid
                          test_agent_id:
                            type: string
                            format: uuid
  /dev/auth/verify:
    post:
      operationId: verifyDevAuth
      summary: Verify development auth code
      responses:
        '200':
          description: Development auth token
  /api/v1/auth/feishu/start:
    get:
      operationId: feishuOAuthStart
      summary: Begin Feishu OIDC login
      description: Mints a CSRF state, drops a short-lived HttpOnly state cookie scoped to /api/v1/auth/feishu, and 302-redirects the browser to the Feishu authorize URL. In mock mode (PARSAR_FEISHU_MOCK=true) the redirect lands straight on the callback with a fixture code.
      responses:
        '302':
          description: Redirect to the Feishu authorize URL (state cookie set)
        '500':
          description: Failed to mint CSRF state
        '503':
          description: Feishu OIDC not configured
  /api/v1/auth/logout:
    post:
      operationId: authLogout
      summary: Log out the current session
      description: Revokes the current session row and clears the session cookie. Idempotent — returns 204 even when no session is present.
      responses:
        '204':
          description: Session revoked and cookie cleared
        '503':
          description: Session store not wired
  /api/v1/auth/feishu/callback:
    get:
      operationId: feishuOAuthCallback
      summary: Complete Feishu OIDC login callback
      description: Exchanges the Feishu OIDC code for a Parsar session cookie. First-time login (new user) triggers automatic personal workspace bootstrap (best-effort; bootstrap failure does not block login).
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Login succeeded; session cookie issued and browser redirected to the admin shell
        '400':
          description: Missing code/state or CSRF state mismatch
        '502':
          description: Feishu OIDC exchange failed
  /api/v1/connections/github/start:
    get:
      operationId: githubConnectionOAuthStart
      summary: Begin personal GitHub account connection
      description: Requires a signed-in Parsar user. Mints a CSRF state cookie and redirects the browser to GitHub OAuth. The callback stores the resulting access token as the current user's github_pat credential so Agents can use existing credential injection for GitHub API and HTTPS git operations.
      responses:
        '302':
          description: Redirect to GitHub OAuth authorize URL
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: GitHub OAuth is not configured
  /api/v1/connections/github/callback:
    get:
      operationId: githubConnectionOAuthCallback
      summary: Complete personal GitHub account connection
      description: Requires the Parsar session cookie from the initiating user. Exchanges the GitHub OAuth code for an access token, encrypts it, and creates or rotates the user's active github_pat credential.
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '302':
          description: GitHub credential saved; browser redirected to Connections
        '400':
          description: Missing code/state or CSRF state mismatch
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          description: GitHub OAuth exchange failed
        '503':
          description: GitHub OAuth is not configured
  /dev/gateway/inbound:
    post:
      operationId: createDevGatewayInbound
      summary: Create an external gateway-shaped inbound message
      description: |
        Dev Gateway-shaped entrypoint for future Feishu/Slack adapters.
        Persists the inbound text through the same scheduling path as fake IM:
        mention parsing, message insert, and queued agent_runs for active
        mentioned Agents. Does not execute Agent runtime.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Supports either flat compatibility fields or nested adapter-style message/actor/conversation_ref fields.
              properties:
                gateway:
                  type: string
                  default: dev
                message:
                  type: object
                  properties:
                    id:
                      type: string
                      description: External message id used as idempotency key.
                    text:
                      type: string
                actor:
                  type: object
                  properties:
                    id:
                      type: string
                      description: External sender subject.
                    email:
                      type: string
                conversation_ref:
                  type: object
                  properties:
                    id:
                      type: string
                      description: External conversation/chat id.
                    title:
                      type: string
                    thread_id:
                      type: string
                conversation:
                  type: string
                external_chat_id:
                  type: string
                  description: Optional external conversation/chat id. If present, conversation lookup uses this value.
                external_thread_id:
                  type: string
                external_user_id:
                  type: string
                  description: Optional external sender subject. If mapped through auth_identities(provider=gateway, subject=external_user_id), the mapped user is used; otherwise sender email is used.
                external_message_id:
                  type: string
                  description: Optional idempotency key scoped to the resolved conversation and gateway. Duplicate inbound requests return existing message/run ids.
                sender:
                  type: string
                text:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Persisted inbound message with queued run ids
        '400':
          description: Invalid request or unknown active agent mention/conversation/sender
  /api/v1/feishu/events/message:
    post:
      operationId: createDevFeishuMessageEvent
      summary: Accept a Feishu message event through the dev gateway seam
      description: Feishu-shaped dev/prod adapter endpoint. In production mode it verifies the Feishu Verification Token and decrypts event-encrypted payloads when `PARSAR_FEISHU_ENCRYPT_KEY` is configured; mock mode skips verification for local e2e. URL verification challenges return 200 with the echoed challenge. Normal message events are normalized through gateway.NormalizeFeishuInbound, then reuse the same Gateway inbound scheduling path as /dev/gateway/inbound.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  type: object
                  required: [message, sender]
                  properties:
                    message:
                      type: object
                      properties:
                        message_id:
                          type: string
                          description: Feishu external message id used as idempotency key.
                        chat_id:
                          type: string
                          description: Feishu chat id mapped to external_chat_id.
                        chat_type:
                          type: string
                        thread_id:
                          type: string
                          description: Feishu thread id mapped to external_thread_id.
                        content:
                          type: string
                          description: Feishu stringified JSON content; text messages are read from content.text.
                    sender:
                      type: object
                      properties:
                        sender_id:
                          type: object
                          properties:
                            open_id:
                              type: string
                            user_id:
                              type: string
                            union_id:
                              type: string
                        tenant_key:
                          type: string
      responses:
        '200':
          description: Feishu URL verification challenge accepted and echoed
          content:
            application/json:
              schema:
                type: object
                required: [challenge]
                properties:
                  challenge:
                    type: string
        '201':
          description: Persisted inbound message with queued run ids
        '400':
          description: Invalid JSON, encrypted payload decrypt failure, or unknown conversation/user/mention mapping
        '401':
          description: Feishu Verification Token mismatch or missing token
        '500':
          description: Unexpected persistence failure
