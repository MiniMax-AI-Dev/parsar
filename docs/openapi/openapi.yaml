          $ref: '#/definitions/dev.cancelAgentRunBody'
      produces:
      - application/json
      responses:
        "200":
          description: '{status, conversation_id, cancelled_count}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: conversation_id is not a valid uuid or invalid json body
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not a workspace member or is viewer-only
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Conversation not found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Bulk cancel not supported by current store
          schema:
            additionalProperties:
              type: string
            type: object
