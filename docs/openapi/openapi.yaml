    post:
      operationId: configureDevConversationExternalRef
      summary: Configure a dev gateway external conversation mapping
      description: Dev-only lightweight mapping from gateway external chat/thread ids to an existing conversation. This uses existing conversations.platform/external_id/external_thread_id columns and does not add SCIM/SSO identity sync tables.
      parameters:
        - name: conversationID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [external_chat_id]
              properties:
                gateway:
                  type: string
                  default: dev
                external_chat_id:
                  type: string
                external_thread_id:
                  type: string
      responses:
        '200':
          description: Existing conversation now has gateway external ids configured
        '400':
          description: Malformed conversation UUID, invalid JSON, or missing external_chat_id
        '404':
          description: Unknown active conversation
        '403':
          description: User lacks required role on this workspace
  /dev/gateway/outbound:
    get:
      operationId: listDevGatewayOutbound
      summary: List pending gateway outbound messages
      description: Dev-only outbound read model over existing agent output messages. Messages are pending while they have not been marked delivered in metadata.
      parameters:
        - name: gateway
          in: query
          required: false
          schema:
            type: string
            default: dev
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Pending outbound messages for the gateway. Response includes internal messages and adapter-friendly deliveries.
        '503':
          description: Database-backed gateway outbound is disabled
  /dev/gateway/outbound/{messageID}/delivered:
    post:
      operationId: markDevGatewayOutboundDelivered
      summary: Mark a gateway outbound message delivered (ops escape hatch)
      description: |
        Ops-only delivery ack. Stamps `messages.metadata.gateway_delivered_at`
        so the Feishu inflight-card driver's claim filter skips the
        conversation that owns this message. Used to manually unstick a
        message whose terminal patch landed in Feishu but whose
        MarkDelivered store call failed (rare; driver retries silently
        in normal operation). Idempotent: re-acking preserves the first
        delivered_at timestamp. The `delivery_id` body field is accepted
        for back-compat with older callers but no longer persisted —
        Feishu-side correlation is held in the gateway_inflight slot
        instead.
      parameters:
        - name: messageID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                delivery_id:
                  type: string
      responses:
        '200':
          description: Message metadata was marked delivered
        '400':
          description: Malformed message UUID or invalid JSON
        '404':
          description: Unknown agent message
        '503':
          description: Database-backed gateway outbound is disabled
  /dev/http-agent/runs/{runID}/invoke:
    post:
      operationId: invokeDevHTTPAgentRun
      summary: Invoke a queued HTTP connector agent run
      description: Dev-only connector harness. Loads one active queued/running agent_run with connector_type=http, POSTs a small invocation payload to an external HTTP Agent endpoint, then reuses the completion path to write output message, usage, audit, and optional child runs from @Agent mentions in the HTTP Agent response. Does not poll, retry, store secrets, or run background workers.
      parameters:
        - name: runID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint:
                  type: string
                  format: uri
                  description: Optional http(s) endpoint override. If omitted, config endpoint is read from agents.config.
                headers:
                  type: object
                  additionalProperties:
                    type: string
                  description: Optional dev-only headers forwarded to the HTTP Agent.
      responses:
        '200':
          description: HTTP Agent returned 2xx JSON and the run was completed with output, usage, audit, and optional child runs
        '400':
          description: Malformed run UUID, invalid JSON, or missing/invalid endpoint
        '404':
          description: Unknown agent run
        '409':
          description: Run is not completable, not connector_type=http, or its agent relation is invalid
        '502':
          description: HTTP Agent network failure, non-2xx response, or invalid JSON response
