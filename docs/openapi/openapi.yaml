                  type: string
      responses:
        '201':
          description: New workspace plus the auto-created owner workspace_member row
        '400':
          description: Invalid body / empty name
        '409':
          description: Could not generate a unique slug after retry (astronomically rare)
        '401':
          description: Missing or invalid auth session cookie (or disabled dev header shim)
        '503':
          description: Database-backed read APIs are disabled
  /api/v1/workspaces/{workspaceID}:
    patch:
      operationId: updateDevWorkspace
      summary: Rename a workspace (name only — slug is permanent)
      description: |
        Patch the human-readable name. Slug is system-generated and
        immutable, so it cannot be changed through this endpoint.
      parameters:
        - name: workspaceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Updated workspace
        '400':
          description: Malformed UUID / empty name
        '404':
          description: Unknown / deleted workspace
        '401':
          description: Missing or invalid auth session cookie (or disabled dev header shim)
        '403':
          description: User lacks required role on this workspace
        '503':
          description: Database-backed read APIs are disabled
  /api/v1/workspaces/{workspaceID}/archive:
