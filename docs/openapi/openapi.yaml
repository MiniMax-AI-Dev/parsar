  /api/v1/conversations/{conversationID}/runs/{runID}/start:
    post:
      description: Marks the run as running (or reports "queued" if a sibling run
        for the same conversation+agent is already inflight) and dispatches it to
        the connector. Callers should then subscribe to /stream for events.
      operationId: startDevConversationAgentRun
      parameters:
      - description: Conversation UUID
        in: path
        name: conversationID
        required: true
        type: string
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Run already running — idempotent no-op
          schema:
            additionalProperties: true
            type: object
        "202":
          description: Run dispatched (running) or held (queued)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: conversation_id or run_id is not a valid uuid
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not a workspace member or is viewer-only
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Run not found or not part of conversation
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Run status must be queued before start
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to mark agent run running
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database-backed conversation run streaming is disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Start a queued agent run
      tags:
      - agent-runs
