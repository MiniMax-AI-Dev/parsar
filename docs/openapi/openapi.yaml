        '401':
          description: Missing or invalid auth session cookie (or disabled dev header shim)
        '503':
          description: Database-backed read APIs are disabled
  /api/v1/workspaces:
    post:
      operationId: createDevWorkspace
      summary: Create a new workspace
      description: |
        Admin path requiring an authenticated caller. The caller is auto-added
        as the workspace's `owner` member in the same transaction. Slug is
        system-generated as `workspace-<12 hex chars>` and is permanent — there
        is no way to set it from the request.
      requestBody:
        required: true
