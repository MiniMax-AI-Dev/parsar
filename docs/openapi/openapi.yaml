        description: Fragments are persisted rows (Confirm=true); empty otherwise.
        items:
          $ref: '#/definitions/specmem.fragmentDTO'
        type: array
      pieces:
        description: |-
          Pieces is the slicer preview (Confirm=false) so the UI can
          show titles before the user commits.
        items:
          $ref: '#/definitions/specmem.importedFragmentDTO'
        type: array
    type: object
  specmem.importedFragmentDTO:
    properties:
      body:
        type: string
      title:
        type: string
    type: object
  specmem.injectionDTO:
    properties:
      incremental_memory:
        type: string
      memory_block:
        type: string
      memory_write_guide:
        type: string
      spec_block:
        type: string
    type: object
  specmem.memoryDTO:
    properties:
      agent_actor:
        type: string
      body:
        type: string
      conversation_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      memory_type:
        type: string
      scope:
        type: string
      source:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      why:
        type: string
      workspace_id:
        type: string
    type: object
  specmem.runtimeCreateFragmentRequest:
    properties:
      body:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  specmem.runtimeCreateMemoryRequest:
    properties:
      body:
        type: string
      memory_type:
        type: string
      scope:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      why:
        type: string
    type: object
  specmem.runtimeUpdateFragmentRequest:
    properties:
      body:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  specmem.runtimeUpdateMemoryRequest:
    properties:
      body:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      why:
        type: string
    type: object
  specmem.updateFragmentRequest:
    properties:
      body:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  specmem.updateMemoryRequest:
    properties:
      body:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      why:
        type: string
    type: object
  store.CredentialKindRead:
    properties:
      built_in:
        type: boolean
      code:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      display_name:
        type: string
      id:
        type: string
      source:
        type: string
      updated_at:
        type: string
      value_schema:
        additionalProperties: {}
        type: object
    type: object
  store.MessageAttachment:
    properties:
      data_base64:
        description: |-
          DataBase64 is the standard-base64 encoded raw bytes. Callers
          MUST NOT base64-encode again on persistence.
        type: string
      kind:
        type: string
      mime:
        description: |-
          MIME is the upstream-reported content type. Falls back to a
          kind-specific default when upstream omits it.
        type: string
      size:
        description: |-
          Size is the byte count before base64 expansion. Cached so
          observability surfaces don't have to decode.
        type: integer
    type: object
  store.RequiredCredential:
    properties:
      description:
        type: string
      kind:
        type: string
      required:
        type: boolean
    type: object
info:
  contact: {}
  description: |-
    Parsar harness API. Optional Feishu SSO and event delivery
    are enabled only when the corresponding PARSAR_FEISHU_* values are configured.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: Parsar API
  version: 0.1.0
paths:
  /agent-daemon/bootstrap:
    post:
      consumes:
      - application/json
      description: Verifies the runner credential and returns the WebSocket URL, heartbeat
        interval, and protocol version the daemon should use.
      operationId: bootstrapAgentDaemon
      parameters:
      - description: Bearer <runner credential>
        in: header
        name: Authorization
        required: true
        type: string
      - description: device_id
        in: body
        name: body
        required: true
        schema:
          properties:
            device_id:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: device_id, workspace_id, ws_url, heartbeat_seconds, protocol_version
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "405":
          description: Method Not Allowed
          schema:
            additionalProperties: true
            type: object
      summary: Bootstrap agent-daemon
      tags:
      - agent-daemon
  /agent-daemon/device-status:
    get:
      description: Reports whether the caller's device has a live WebSocket registration
        and, when configured, the current owner-pod lease.
      operationId: getAgentDaemonDeviceStatus
      parameters:
      - description: Bearer <runner credential>
        in: header
        name: Authorization
        required: true
        type: string
      - description: device id
        in: query
        name: device_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: device_id, online, owner
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Agent-daemon device status
      tags:
      - agent-daemon
  /agent-daemon/ws:
    get:
      description: Long-lived duplex channel for daemon runtimes. Authenticated by
        the runner bearer passed as a query param since websockets have no header
        stage before upgrade.
      operationId: agentDaemonWebsocket
      parameters:
      - description: device id
        in: query
        name: device_id
        required: true
        type: string
      - description: runner bearer credential
        in: query
        name: token
        required: true
        type: string
      - description: daemon protocol version
        in: query
        name: version
        required: true
        type: string
      responses:
        "101":
          description: protocol switched
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "426":
          description: incompatible protocol version
          schema:
            additionalProperties: true
            type: object
      summary: Agent-daemon WebSocket upgrade
      tags:
      - agent-daemon
  /api/v1/agent-runs/{runID}:
    get:
      description: Returns the full record for a single agent run. Caller must belong
        to the run's workspace.
      operationId: getDevAgentRun
      parameters:
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Agent run
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid UUID
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller lacks permission
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Run not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get an agent run
      tags:
      - agent-runs
  /api/v1/agent-runs/{runID}/cancel:
    post:
      consumes:
      - application/json
      description: Marks the run cancelled, tells the connector to abort its session,
        and records a run.cancelled lifecycle event. Idempotent — completed / failed
        / cancelled runs return 422.
      operationId: cancelDevAgentRun
      parameters:
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      - description: Optional cancel reason
        in: body
        name: body
        schema:
          $ref: '#/definitions/dev.cancelAgentRunBody'
      produces:
      - application/json
      responses:
        "200":
          description: Run cancelled or already cancelling
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: run_id is not a valid uuid or invalid json body
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not a workspace member or is viewer-only
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Run not found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Run already in a terminal status
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Database-backed run cancel is disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cancel a single agent run
      tags:
      - agent-runs
  /api/v1/agent-runs/{runID}/requeue:
    post:
      consumes:
      - application/json
      description: Re-schedules a failed or stalled agent run. Owner/admin only.
      operationId: requeueDevAgentRun
      parameters:
      - description: Agent run UUID
        in: path
        name: runID
        required: true
        type: string
      - description: Requeue payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.requeueAgentRunBody'
      produces:
      - application/json
      responses:
        "200":
          description: Requeued run
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid body or UUID
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not workspace owner/admin
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Run not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Re-queue an agent run
      tags:
      - agent-runs
  /api/v1/agent-runtime/injection/incremental:
    get:
      description: Returns memory rows created since the caller's cursor. Empty delta
        is normal.
      operationId: getAgentRuntimeIncremental
      parameters:
      - description: RFC3339 cursor timestamp
        in: query
        name: since
        required: true
        type: string
      - description: max rows
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/specmem.injectionDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Incremental injection delta
      tags:
      - runtimes
  /api/v1/agent-runtime/injection/snapshot:
    get:
      description: Returns the SessionStart injection bundle (spec + memory blocks
        + write guide) for the caller's runtime identity.
      operationId: getAgentRuntimeSnapshot
      parameters:
      - description: max spec fragments
        in: query
        name: spec_limit
        type: integer
      - description: max user memories
        in: query
        name: user_memory_limit
        type: integer
      - description: max workspace memories
        in: query
        name: workspace_memory_limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/specmem.injectionDTO'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Snapshot injection bundle
      tags:
      - runtimes
  /api/v1/agent-runtime/memories:
    get:
      description: Lists memories in the requested scope, bound to the caller's runtime
        identity.
      operationId: listAgentRuntimeMemories
      parameters:
      - description: memory scope
        enum:
        - user
        - workspace
        in: query
        name: scope
        required: true
        type: string
      - description: memory type filter
        enum:
        - user
        - feedback
        - workspace
        - reference
        in: query
        name: memory_type
        type: string
      - description: comma-separated tag filter
        in: query
        name: tag
        type: string
      - description: max rows
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List memories (agent-runtime)
      tags:
      - runtimes
    post:
      consumes:
      - application/json
      description: Persists a memory attributed to the caller's runtime identity.
        scope=workspace requires a workspace binding on the runtime.
      operationId: createAgentRuntimeMemory
      parameters:
      - description: memory payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/specmem.runtimeCreateMemoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/specmem.memoryDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a memory (agent-runtime)
      tags:
      - runtimes
  /api/v1/agent-runtime/memories/{memoryID}:
    delete:
      description: Deletes a memory owned by the caller's runtime identity. Cross-owner
        or cross-workspace deletes are masked as 404.
      operationId: deleteAgentRuntimeMemory
      parameters:
      - description: memory id
        in: path
        name: memoryID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a memory (agent-runtime)
      tags:
      - runtimes
    patch:
      consumes:
      - application/json
      description: Mutates a memory owned by the caller's runtime identity. Cross-owner
        or cross-workspace access is masked as 404.
      operationId: updateAgentRuntimeMemory
      parameters:
      - description: memory id
        in: path
        name: memoryID
        required: true
        type: string
      - description: new content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/specmem.runtimeUpdateMemoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/specmem.memoryDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a memory (agent-runtime)
      tags:
      - runtimes
  /api/v1/agent-runtime/spec/fragments:
    get:
      description: Lists fragments in the workspace bound to the caller's runtime
        identity.
      operationId: listAgentRuntimeSpecFragments
      parameters:
      - description: filter by source
        enum:
        - manual
        - agent
        - import
        - user
        - auto-review
        in: query
        name: source
        type: string
      - description: comma-separated tag filter
        in: query
        name: tag
        type: string
      - description: max fragments
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List spec fragments (agent-runtime)
      tags:
      - runtimes
    post:
      consumes:
      - application/json
      description: Persists a fragment attributed to the caller's runtime identity.
        Source is fixed to SourceAgent.
      operationId: createAgentRuntimeSpecFragment
      parameters:
      - description: fragment content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/specmem.runtimeCreateFragmentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/specmem.fragmentDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a spec fragment (agent-runtime)
      tags:
      - runtimes
  /api/v1/agent-runtime/spec/fragments/{fragmentID}:
    delete:
      description: Deletes a fragment owned by the caller's workspace. Cross-workspace
        deletes are masked as 404.
      operationId: deleteAgentRuntimeSpecFragment
      parameters:
      - description: fragment id
        in: path
        name: fragmentID
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a spec fragment (agent-runtime)
      tags:
      - runtimes
    patch:
      consumes:
      - application/json
      description: Mutates a fragment owned by the caller's workspace. Cross-workspace
        access is masked as 404.
      operationId: updateAgentRuntimeSpecFragment
      parameters:
      - description: fragment id
        in: path
        name: fragmentID
        required: true
        type: string
      - description: new content
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/specmem.runtimeUpdateFragmentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/specmem.fragmentDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a spec fragment (agent-runtime)
      tags:
      - runtimes
  /api/v1/agents/{agentID}:
    delete:
      description: Marks the agent as deleted; existing conversations are retained.
        Owner/admin only.
      operationId: deleteDevAgent
      parameters:
      - description: Agent UUID
        in: path
        name: agentID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Deleted agent
          schema:
            additionalProperties: true
            type: object
        "400":
          description: agent_id must be a valid uuid
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not workspace owner/admin
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Unknown agent
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Soft-delete an agent
      tags:
      - agents
    patch:
      consumes:
      - application/json
      description: Applies a partial update. All fields are optional; nil pointers
        mean "leave as-is". Slug and runtime are immutable and rejected with 422.
      operationId: updateDevAgent
      parameters:
      - description: Agent UUID
        in: path
        name: agentID
        required: true
        type: string
      - description: Partial agent update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.updateAgentBody'
      produces:
      - application/json
      responses:
        "200":
          description: Updated agent
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Malformed request body or invalid UUID
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not workspace owner/admin
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Immutable field (slug/runtime), or unknown capability
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update mutable agent fields
      tags:
      - agents
  /api/v1/agents/{agentID}/connector:
    post:
      consumes:
      - application/json
      description: Attaches or updates an agent's outbound channel connector configuration.
        Owner/admin only.
      operationId: configureDevAgentConnector
      parameters:
      - description: Agent UUID
        in: path
        name: agentID
        required: true
        type: string
      - description: Connector config payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.configureAgentConnectorBody'
      produces:
      - application/json
      responses:
        "200":
          description: Updated agent
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not workspace owner/admin
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Unknown agent
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Configure an agent's connector
      tags:
      - agents
  /api/v1/agents/{agentID}/connector/feishu:
    patch:
      consumes:
      - application/json
      description: Updates the agent's Feishu connector credentials/config. Owner/admin
        only.
      operationId: updateDevAgentFeishuConnector
      parameters:
      - description: Agent UUID
        in: path
        name: agentID
        required: true
        type: string
      - description: Connector payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dev.updateAgentFeishuConnectorBody'
      produces:
      - application/json
      responses:
        "200":
          description: Updated agent
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid body or UUID
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not workspace owner/admin
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Agent not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update an agent's Feishu connector
      tags:
      - feishu
  /api/v1/agents/{agentID}/connector/feishu/diagnostics:
    get:
      description: Returns diagnostic snapshots for the agent's Feishu connector (webhook
        subscription, event verify, bot token).
      operationId: getDevAgentFeishuDiagnostics
      parameters:
      - description: Agent UUID
        in: path
        name: agentID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Diagnostics snapshot
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid UUID
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not workspace owner/admin
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Agent not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get an agent's Feishu connector diagnostics
      tags:
      - feishu
  /api/v1/agents/{agentID}/connector/feishu/provision/begin:
    post:
      description: Starts the async Feishu app provisioning flow for the agent's connector.
        Returns a session handle to poll.
      operationId: beginDevAgentFeishuProvisioning
      parameters:
      - description: Agent UUID
        in: path
        name: agentID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Provisioning session
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid UUID
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Caller is not workspace owner/admin
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Agent not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Begin Feishu provisioning
      tags:
      - feishu
  /api/v1/agents/{agentID}/connector/feishu/provision/poll:
    post:
      consumes:
      - application/json
      description: Polls the async Feishu provisioning flow. Returns the current step
        and any completion payload.
