<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- Fonts: Space Grotesk (display headings), Inter (Latin body/UI),
         Noto Sans SC (Chinese — Inter has no CJK glyphs, else it silently
         falls back to the OS font), Geist Mono (ids/durations). Loaded via
         <link> not CSS @import: Tailwind v4 inlines its own @import above,
         which would make a CSS @import spec-invalid (silently dropped). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@300..700&family=Noto+Sans+SC:wght@400;500;700&family=Geist+Mono:wght@400..600&display=swap"
    />
    <title>Parsar</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
