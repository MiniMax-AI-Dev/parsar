# Parsar self-hosted deployment compose example.
#
# This file is a STARTING POINT for a self-hosted deployment (on-prem,
# single-host docker host, internal staging). It is NOT a turnkey
# production file — image tag, real secrets, TLS termination, log /
# state volume choices all still have to be filled in by ops.
#
# Profile principle: a self-hosted deployment is a *deployment profile*
# of the open-source core, not a fork. Same binary, same migrations,
# same OpenAPI; differences live only in:
#   - this compose file (image registry, ports, volume layout);
#   - the mounted config.yaml (~/.parsar/config.yaml inside container);
#   - the .env file alongside this compose (secret injection).
#
# See:
#   docs/deploy/deploy-runbook.md            - end-to-end runbook
#   docs/deploy/config.example.yaml          - config template
#   deploy/compose/.env.example              - env template
#
# Usage:
#   1. cd deploy/compose && cp .env.example .env
#   2. Fill .env with real values from your secret manager
#      (NEVER commit the resulting .env back to the repo — it is
#      already covered by the repo-root .gitignore `.env.*` rule).
#   3. Copy docs/deploy/config.example.yaml to a sibling
#      path OUTSIDE the repo (e.g. /etc/parsar/config.yaml) and
#      replace every <placeholder> with the real value.
#   4. Adjust the bind-mount paths below to match where you put
#      the config file and where you want runtime state to live.
#   5. docker compose -f deploy/compose/compose.selfhost.yml --env-file .env up -d
#   6. Open the web UI and create the first owner account.
#
# Hard rules baked into this file:
#   - Postgres data lives on a named volume, never inside the repo CWD.
#   - Parsar runtime state binds to a host directory you control,
#     also outside the repo (matches the project-wide `~/.parsar/`
#     hard rule — inside the container the mount point is
#     `/var/lib/parsar`).
#   - Real secrets ONLY arrive via env file or container env (Docker
#     secret / K8s secret). The config.yaml on disk uses placeholders;
#     env wins at runtime.
#   - The compose file itself contains NO production hostnames,
#     real registry paths, real app IDs, or real verification
#     tokens. Anything that looks specific is a placeholder.

# Compose schema version is intentionally omitted — current `docker
# compose` (v2+) ignores the `version` field and warns when present.

services:
  postgres:
    # Pin a minor version so the OS upgrade story is predictable.
    # Switch to your private Postgres mirror if you do not allow
    # docker.io pulls from production hosts.
    image: postgres:16-alpine
    container_name: parsar-postgres
    restart: unless-stopped
    # All PARSAR_PG_* values come from deploy/compose/.env (copy
    # .env.example → .env). This file no longer carries inline
    # defaults so .env.example stays the single source of truth.
    environment:
      POSTGRES_USER: ${PARSAR_PG_USER}
      POSTGRES_PASSWORD: ${PARSAR_PG_PASSWORD:?PARSAR_PG_PASSWORD is required - put it in .env}
      POSTGRES_DB: ${PARSAR_PG_DB}
    # Bind to localhost only by default. If a separate Postgres host
    # is used, comment this service out entirely and point DATABASE_URL
    # at the external instance instead.
    ports:
      - "127.0.0.1:${PARSAR_PG_HOST_PORT}:5432"
    volumes:
      - parsar-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${PARSAR_PG_USER} -d ${PARSAR_PG_DB}
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  parsar-server:
    # Defaults to the GHCR prebuilt image (same one docker-compose.yml
    # uses — profile not fork). Override PARSAR_SERVER_IMAGE in .env to pull
    # from your own registry (e.g. an Aliyun ACR mirror) or a pinned tag.
    image: ${PARSAR_SERVER_IMAGE:-ghcr.io/minimax-ai-dev/parsar-server:latest}
    container_name: parsar-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # The server binds to :8080 inside the container. Behind a
      # reverse proxy (nginx / caddy / ingress) terminate
      # TLS there and forward to 127.0.0.1:8080 on the host.
      - "127.0.0.1:${PARSAR_HOST_PORT}:8080"
    environment:
      # ---------- Required ----------
      # Postgres connection. Use the service name `postgres` when
      # running inside this compose network; replace with an external
      # connection string if you removed the postgres service.
      DATABASE_URL: postgres://${PARSAR_PG_USER}:${PARSAR_PG_PASSWORD}@postgres:5432/${PARSAR_PG_DB}?sslmode=disable
      PARSAR_MASTER_KEY: ${PARSAR_MASTER_KEY:?PARSAR_MASTER_KEY is required - generate with openssl rand -hex 32}
      PARSAR_PUBLIC_URL: ${PARSAR_PUBLIC_URL:?PARSAR_PUBLIC_URL is required - e.g. https://parsar.your-domain.com}

      # ---------- Listen / runtime path ----------
      PARSAR_ADDR: ":8080"
      PARSAR_DATA_DIR: "/var/lib/parsar"

      # ---------- Optional config file ----------
      # When set, the server merges this YAML on top of defaults; env
      # wins over YAML. Leave the value here as-is — the bind-mount
      # below decides whether a file is actually present.
      PARSAR_CONFIG_FILE: "/etc/parsar/config.yaml"

      # ---------- Auth (production posture) ----------
      PARSAR_DEV_AUTH: "false"

      # ---------- Optional Feishu SSO + event subscription ----------
      # Leave empty for the default first-owner setup and email/password
      # login. Fill these in only when enabling Feishu SSO or Feishu IM
      # event delivery.
      PARSAR_DAEMON_REPO: ${PARSAR_DAEMON_REPO}
      PARSAR_FEISHU_MOCK: ${PARSAR_FEISHU_MOCK}
      PARSAR_FEISHU_APP_ID: ${PARSAR_FEISHU_APP_ID}
      PARSAR_FEISHU_APP_SECRET: ${PARSAR_FEISHU_APP_SECRET}
      PARSAR_FEISHU_REDIRECT_URI: ${PARSAR_FEISHU_REDIRECT_URI}
      PARSAR_FEISHU_VERIFICATION_TOKEN: ${PARSAR_FEISHU_VERIFICATION_TOKEN}
      PARSAR_FEISHU_ENCRYPT_KEY: ${PARSAR_FEISHU_ENCRYPT_KEY}
      PARSAR_LOGIN_REDIRECT_URL: ${PARSAR_LOGIN_REDIRECT_URL}
      # Host overrides — leave blank unless you reverse-proxy Feishu
      # through a private endpoint.
      PARSAR_FEISHU_AUTHORIZE_BASE: ${PARSAR_FEISHU_AUTHORIZE_BASE}
      PARSAR_FEISHU_API_BASE: ${PARSAR_FEISHU_API_BASE}

      # ---------- Agent Daemon sandbox ----------
      # AGENT_DAEMON_OWNER_URL tells in-sandbox parsar-daemon how to reach
      # this server. In K8s it can be derived from the downward-API
      # POD_IP; under docker compose we default to the service name on
      # the internal compose network.
      PARSAR_AGENT_DAEMON_OWNER_URL: ${PARSAR_AGENT_DAEMON_OWNER_URL:-http://parsar-server:8080}
      # When set, OpenCode runs dispatched through the Agent Daemon
      # connector can be backed by a platform-managed sandbox instead
      # of a paired parsar-daemon device. Leave blank to stick to
      # local-daemon runtimes.
      PARSAR_E2B_API_KEY: ${PARSAR_E2B_API_KEY}
      PARSAR_E2B_TEMPLATE_ID: ${PARSAR_E2B_TEMPLATE_ID}
      PARSAR_E2B_TIMEOUT_SECONDS: ${PARSAR_E2B_TIMEOUT_SECONDS}
      PARSAR_E2B_API_BASE_URL: ${PARSAR_E2B_API_BASE_URL}

      # ---------- Audit / OTLP fan-out (optional) ----------
      PARSAR_AUDIT_OTLP_ENABLED: ${PARSAR_AUDIT_OTLP_ENABLED}
      PARSAR_AUDIT_OTLP_ADDR: ${PARSAR_AUDIT_OTLP_ADDR}
      PARSAR_AUDIT_OTLP_SIGNING_KEY: ${PARSAR_AUDIT_OTLP_SIGNING_KEY}
      PARSAR_AUDIT_OTLP_EXTERNAL_ENDPOINT: ${PARSAR_AUDIT_OTLP_EXTERNAL_ENDPOINT}
      PARSAR_AUDIT_OTLP_FANOUT_ENDPOINT: ${PARSAR_AUDIT_OTLP_FANOUT_ENDPOINT}

      # ---------- Object storage (Aliyun OSS) ----------
      # Required to enable Plugin capability uploads. Leave EVERY
      # field blank to disable plugin support (MCP + Skill flows
      # are unaffected, the UI returns a clean 503 on /uploads/*).
      # See .env.example for region-vs-base-url format notes.
      PARSAR_OSS_REGION: ${PARSAR_OSS_REGION}
      PARSAR_OSS_BUCKET: ${PARSAR_OSS_BUCKET}
      PARSAR_OSS_ACCESS_KEY_ID: ${PARSAR_OSS_ACCESS_KEY_ID}
      PARSAR_OSS_ACCESS_KEY_SECRET: ${PARSAR_OSS_ACCESS_KEY_SECRET}
      PARSAR_OSS_BASE_URL: ${PARSAR_OSS_BASE_URL}
      PARSAR_OSS_ENDPOINT: ${PARSAR_OSS_ENDPOINT}

    volumes:
      # Optional config file. Comment out if you inject everything
      # via env. The host path is up to ops — put it under a directory
      # the deploy user owns, NEVER inside the repo. Strict-required
      # (`${VAR:?msg}`) so an empty value fails fast: Docker Compose
      # would otherwise resolve a relative default to the compose-file
      # directory and silently bind-mount into the repo, violating the
      # "no runtime state inside the repo" hard rule in
      # docs/PARSAR_DEV_CONTEXT.md §8.
      - ${PARSAR_CONFIG_HOST_PATH:?PARSAR_CONFIG_HOST_PATH must be an absolute path outside the repo, e.g. /etc/parsar/config.yaml}:/etc/parsar/config.yaml:ro
      # Runtime state (audit ingester scratch, opencode per-run scratch,
      # smoke evidence). Bind to a host directory under
      # ops control; matches the project-wide
      # "runtime under ~/.parsar/" rule from inside the container.
      - ${PARSAR_DATA_HOST_PATH:?PARSAR_DATA_HOST_PATH must be an absolute path outside the repo, e.g. /var/lib/parsar}:/var/lib/parsar

    # Liveness + readiness probes mirror the official health contract
    # (see docs/deploy/health-and-smoke.md). Liveness uses /healthz
    # so a flaky DB does NOT restart-loop the container; readiness
    # gating belongs at the reverse-proxy / orchestrator layer.
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- --tries=1 --timeout=3 http://127.0.0.1:8080/healthz >/dev/null
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  parsar-postgres-data:
    name: parsar-postgres-data
